body:
  text: 縉雲文集附録古城馮侯廟碑左朝請大夫提點成都府刑獄公事馮侯諱時行字當可隆興元年死其官侯有功業於時死凡四季名山進士喻大中合邦人之思築宫于縣之古城以俎豆侯又三年駒來守雅州考侯事之終始刻之石先是經界之禍此邦實烈方經界之令甫頒民恐懼奔走徇朝廷之法不敢輕售其姦法既行久且玩姦民始生心爭為僥幸之槖取前日之令紛更之而弊始錯出跬步之田而受倍蓰之稅連阡陌者以巧幸入輕租破業析産瘠溝中者枕藉幾蹈湯火之酷將且十年而侯持節而來問民疾苦首得此蹙然為之寢食不遑毒於民者莫烈此即閉閣書奏報天子乞仍其故既畫可行民歡迎曰吾今更生矣及侯死民聚哭曰我有室廬侯畀我使獲弛然安居其下有田以耕以飽皆侯賜雖一飯必祝大衆斥七十萬錢縛屋二十五楹中為堂塑侯像挾以兩廡民歲時歌舞其下水旱厲疾必禱侯亦能出為禍福以恐動其民而食其土自侯為部使者經畫邊事尤縝密此邦著之令甲世守焉侯恭南人明果敢斷足以當大事文尤高古人不敢斥其字目為縉雲先生紹興初宰通義之丹稜以政最召行在所時權臣柄朝撓節徇女真之和侯斥其非是對天子言剴切出守萬州部使者迎附權臣侯退居里社凡十年權臣死復出為州守蓬黎及天彭遂持節以死侯所在政卓異多去思民必祠之夫考風俗著其媺惡太守事也是故為之記而繫之以聲詩使邦民歌以妥侯靈詩曰潔樽罍兮酒洌清籩豆靜嘉兮肥腯其牲坎坎擊鼓兮式和且平攜持父子兮進侯庭維廟孔嚴兮有覺其楹寢簟孔安兮維侯是寧維侯相民兮式臨爾誠雨我田兮淡淡其盈欲暘而暘兮牸犢肆耕厲鬼驅左兮風不暴盲維侯是安兮侯無遽征朝奉郎權發遣雅州軍州事主管學事沿邊都巡檢使蹇駒撰縉雲文集附録
