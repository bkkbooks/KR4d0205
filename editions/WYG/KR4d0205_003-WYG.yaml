body:
  text: 縉雲文集巻四宋馮時行撰墓誌銘劉尚之墓誌銘丹稜劉尚之為布衣諸生好談兵學縱横捭闔之術宣和末自言世將大亂亂世有用之才非我輩其誰已而果亂尚之適從其族叔汲守鄧州出身乗城冒犯矢石百計支撑城卒陷汲死尚之脱身還蜀平昔固喜兵身又間闗兵亂熟習艱難變故益自喜又通隂陽孤虚占筮自詭當秉旌鉞專閫出疆如傅介子班定逺事還蜀未幾病卒享年三十有三名志士矣娶楊氏生一子庭實曽祖潤祖昌辰父毅尚之不事生産死之日家無擔石其子庭實刻苦力學東西拾掇以葬又能踰九折坂兩徃返求其父故人縉雲馮某誌其父夫古今率以成敗論士彼幸而成光焰翕赫人從而嚮慕嗟嘆誦詠不絶口否則抵掌笑曰狂士狂士如吾尚之豈能逃世俗譏嘲誚笑哉余嘗謂才不才禀於天可得而知也黙制其成敗者又有天焉不可得而知也使才即有成即富貴不才即無成即貧賤是天如合契券庸人孺子皆得而知之何天之淺甚也如此惟才不才成敗得䘮徃徃一切跌錯繆亂不可致詰夫然後人曰彼蒼難測哉嗚呼尚之其真狂士耶是為銘闕張廷臣墓誌銘吾鄉人張廷臣諱獻忠本武金人六世祖幸周佐王建定蜀有功封大傅右僕射守渝州子孫因家焉其後改渝為恭故廷臣為恭州人曾祖某祖某父某皆有鄉行以豪長者稱廷臣嘗從其叔父元明學易入三舍為諸生舍法罷靖康軍興國用乏闕廷臣願率先鄉人傾家財助國者一時七十餘家朝廷皆命以官莫不欣然自得裝金帛飾裘馬爭調銓曹從事州縣臺府而廷臣獨杜門却掃淡然無進取意人問之廷臣曰品秩卑㣲當趨走役使於要人大官如奴客緹騎孰與優㳺田舍早卧晏起治醪醴畜鷄豚追逐鄉隣銜杯笑歌之為樂耶人皆賢之廷臣立家塾聚詩書教其子濱大江建亭館植花竹歲時合族屬隣里樂飲遨嬉如其志平生慎言語謹細故信佛法年五十二當紹興二十七年某月日偶疾敕戒家人索紙筆書一偈以卒娶毛氏生四子某皆應進士舉女二人長適某次適某再娶馮氏生一子某未冠將以某年月日舉廷臣之䘮葬于某鄉某里某山之原元鼎等求其父常從之㳺而文者亟請銘其幽穴某以鄉隣之義感疇曩之情銘不忍辭銘曰凢人莫不敗於妄蹶於狂嗚呼廷臣安分守常不敗不蹶今也則亡刻吾銘詩以炳幽藏張吉甫墓銘宋紹興十一年歲在辛酉八月初二日南平張吉甫年六十八卒于正寢將以十三年十一月初九日葬光宅里實合市之東瀛山下其子宿越五百里抵恭之樂磧丐銘於其友馮某甚力某閲其行實當得銘又與宿初相識京師定交迄今二十年銘不當辭公諱商吉甫其字也曾祖某祖某父某其先本長安唐末宦蜀亂不能自還居普州龍歸鎮祖徙懷化軍熈寧間置南平軍而懷化廢今為南平人公性至孝始生而父已卒皇祖妣皇妣在堂四十餘年公事養盡力皇妣常疾病公年未冠割股膳以進病愈事著聞郡縣旌異有姊孀而貧公迎之敬事于家事大小必請終其身鄉黨朋友急難公赴之惟恐後親族之貧不能嫁娶死不能葬公任之凢百餘家所居三溪之南三十里有大溪當行衝溪出兩山間至是為石梁益湍急不能五十歩斬為崖懸注而下夏漲行人絶悍流力不能與水爭一跌立碎崖下者不知其幾何人公捐百金頓為石橋渉者如遇枕席利無窮也嗚呼今世大夫士食天子廪稍職民氓顧偃蹇傲嬉民瘠瘵不加省甚者蠧敗椓傷以為利公在畎􅅕而得施一鄉茍利人雖大有所費捐不顧惜其賢何如也公讀書務通大義方伎小説古今詞章多記誦好賓客客至飲酒弈碁閲月不視家事靜重絶臧否待人雖稚孺加謹敬娶馮氏生二子長曰宏次曰宿一女適進士瞿洵武宏與瞿氏女皆先公卒宿中紹興五年武舉第今為承節郎孫男七人槐桴􅫉樞楫杞栝楫後公一年卒女孫二人初二子之生也公慨然曰商水簪紳落窮荒墮廢先業幸有子賢否在所始起墜緒續前光者頋不在茲歟又曰出入六藝之文泓然深􅃉發於事業者則時之選決機應敵定封侯之業不旋踵亦吾之好也乃命宏曰惟汝文命宿曰惟汝武又曰前人聲勲在簡冊汝之學肖古人則踰今人有成矣宏長為名進士三冠選舉不幸蚤死宿官東呉㑹金人歸我河南朝廷應之事劇費大且疑信未定有司多擇果敢有術略者自從而宿在選然施設未著其必有待未艾也率要二子略如公之志云銘曰爵弗及以仁則尊夀有止以子則存室之幽而昭以斯文死而無憾者其孰如君乎白昭度墓誌銘白昭度死將葬其弟約與其子雍請銘其幽穴某適被命造朝行事薄遽不暇作又惟從吾先君以來世與白氏相好某與昭度生同鄉年齒相若幼遨嬉長學鄉校㳺郡庠徜徉里閈無十日不同者昭度又躬行仁義忠信之行著一鄉鄕之人望而敬之聞其名識與不識皆嗟嘆曰善士善士今歸骨邱壤在昔契不可辭第以不暇無一見意然實不暇也姑繫以銘古者行修於身行於國家天下本諸身而已後世計功利取近効然後才術勝而德行衰當治世大夫士設施本諸身者盖鮮如吾昭度玉粹春温物即而化為匹夫行著一鄉其猶古所謂修諸身者歟嗚呼已矣下宅𤣥深既固且寧以利其後之人白子安墓誌銘宣和初僕應進士舉道過白子安家於時天下將亂衣冠競為短狹者自京師達四方子安狀癯修七尺餘長領闊袖埀大帯至舄出揖客危坐言論簡古一子初束髮立於側甚恭尋授㫖具酒饌應對進趨閑習既别去心竊敬慕殆今二十年子安之死已十四年矣其子某前所見初束髮者三十餘今為名進士登紹興九年進士第將葬狀子安之行泣請銘具言某不幸親不及養力學兾得名位以葬然竟未售久不葬益懼不孝力貧就事棺椁衣衾有不如禮子及見先君願丐以銘僕聞其言頗憶見子安如前日今壯者死少者壯慨然不能已已而敘所聞為之銘曰僕聞子安和厚長者於兄弟親戚交㳺一出於友愛誠敬無間言晩貧或曰家近市不遂什百何以為生曰吾以是為生又曰君忍貧或可子且幼何以貽後曰吾以是貽後又聞子安家甞有靈芝生庭樹髙尺踰年出瑞竹二子安笑曰吾所存無與於人寧有與於天邪比死殯舊廬子出贅殆百里一夕鄰舍火子適至烟焰中僅出一棺意子安平生所存天實相之也子安名某享年若干娶某氏生男女若干曾祖某祖某父某世家於恭州之函谷卒於某年月日葬於某年月日嗚呼某鄉某里某山之下是惟子安之室至於千萬年陵谷變遷得斷石於荆榛坎陷之間濯而讀之猶能使子安之賢有聞有斯銘存楊隠父墓表紹興乙卯丙辰間某甞令丹稜始至則求鄉之賢碩耆艾敬禮之與之游而得楊隠父隠父為人清中夷外見㣲知著仁義君子也去官别隠父盖十三年而隠父死又九年其子恕追惟其父所甞信厚者於是來告葬期且乞表著其行事隠父名煒系本闗西唐僖宗幸蜀有為行營招討使者諱光居唐安其後為眉州别駕者諱光逺徙居丹稜由招討盖三世至别駕由别駕又四世至齊即隠父曾祖世通三大經補廣文館學生祖素贈朝散大夫尚氣節為郡邑豪長者豫章黄魯直一見竒之父時登崇寧二年第累遷朝請郎知合州為吏依倚法令以清厲著稱隠父孝友純至通敏名能文詞入太學所與游皆海内名俊以父任授將仕郎遷修職郎歴監雅州名山茶場漢州普潤鎮卭州蒲江縣酒税名山自元豐定例入茶四萬駝馬與出子錢五十萬秩京官監者以賞故輒如令然貸本彊過民園力外數等迨徵斂無以給輸用破産甚或赴水火以死隠父至視官積猶以千萬計已而驗民封殖益空荒喟然曰吾又效尤無名山矣敬一言上匄罷民輸益發陳積及終更不忍舉一事毫髮與賞當所至茶鹽酒犯法輒縱不治或病之隠父曰法之存不惟其殘惟其寛寜失銖兩之姦以靖告訐不猶愈乎今立購緝小民相為讎怨其害豈失一姦比耶大抵隠父素所蓄積寛簡洪裕不為世俗碌碌淺近不幸其道窮其年不永以死無大施用於時嗚呼惜哉甞論大夫士出處而已出之弊一意於得僵仆聲利極不知止處之弊矯激不情自私以名髙而無與於一世隠父執持難進之節介介自守而不廢君臣之義故雖處而不矯禄仕獨取衆人所棄未甞㣲見言色若有望於世者故雖出而不累昔聖人過夫既得患失歸潔其身者則隠父之賢不待較而彰矣隠父娶朝請大夫劉金道女生男女七人男曰恕慤懋女適張孝廣史極史籍皆名家一未及笄年五十六以紹興十八年五月壬申卒二十七年十月乙卯葬於縣之至孝鄉西之平原任全一墓誌銘中巴之國渝水之濱有隠君子姓任氏諱淵字全一靖康初調資州内江縣令於時方軍興有司徵發一切破程度過率數倍不經民久安一日出重遽始惶擾公為政務安靖供㣥期及事不以捷給為能猶遇事踧踖不忍設施及代當改官嘆曰時如此吾滋不欲吏矣年四十餘精力不任取貴顯棄歸杜門里中非至交親莫識面同年與甞共事者任部使者從騎吏至門願一見卒不得偃仰一室澹泊自守者閲二十年卒於家年若干實紹興十四年某月日也嗚呼世固有强任敢斷不顧冒得形勢負倚公上輒盡民貲藉以進取死且不止其次喑受指使裒剥附益一得上官顔色喜不勝間有知識或顧惜不敢爭不得已猶包蓄愧恥日蹙頞俛首從事公能自貴重不肯損折毫髮卧蓬蓽樂貧賤極老無悔不既賢矣乎其曰隠君子孰謂不宜公之先遂寧曾祖某祖某父某公自少文行有聞登政和八年上舍第授迪功郎尉遂寧府青石縣未幾更授府學教授陞從事郎秩滿移䕫州路授開州開江縣令襄陽王蕃主䕫州選事以文學老故自當接公頗簡倨時開江奏已前上公奮袖去不就蕃悔即書走置謝固願還仍屬道前郡勸止不答久之勅下竟不赴其介特如此㑹有薦之朝授懷安軍教授宣和中有㫖除三舍少教授員去攝果州相如縣丞治有效遷令久之授合州巴川縣令滿遷資州内江縣令公前後所歴職師儒軌度以身士有法則皆立行義絶浮惰比比出為聞人為縣先教化旌禮孝悌吏奉法無所私退而家居宗族鄰里感慕興愛敬比死一鄉哭之皆哀夫人孫氏成都人作配君子出任隠居協德無違生三子安國興國觀國皆服明訓為成人興國觀國有文興國兩貢禮部三女適某人十三年夏族人有病疫癘長老盡死未斂獨二穉在人問勞或傳致飲食即病有死者皆絶跡不敢近公與夫人欲自臨治斂事收孤歸子弟撁挽求緩不聽病竟傳公家老少皆病二婢死冢婦死夫人相繼死公言義如是不悔夫人先公若干日卒享年若干以某年月日合葬於浮屠山之西岡公既謝事絶交㳺某行輩又出公下數等毎進見特相敬愛復與其子興國游葬有日興國泣請銘義不得辭銘曰士之出處物與身有如持衡更重輕公挾所有甚自珍視物緇銖身千鈞躍出滓穢甘沉冥固取抑塞俾道伸不矯不亢用吾情古有隠者斯其人嗚呼已矣封其扃何以彰之勒斯銘僖潤甫墓誌銘僖氏本晉陽人實春秋僖負羈之後唐懿僖之代賜今姓祖孫三世茂著勲庸旄節相望可謂盛矣夫三代為將道家所忌僖氏自唐迄今埀三百年子孫蕃衍詩禮傳世鬱為名族必其仁義之師殺人本於克濟僵敵志在除殘餘烈猶存世食舊德者也今其可考者鐵務使以時方板蕩政移悍藩即從晉陽避亂入蜀孟知祥鄉枌雅好比肩戎行即署武信軍節度兵馬使資其壯謀共保割據鐵務心存王室蹇達無渝肥遁山林力辭偽命以此忠正開基雙石所謂利不可回節不可奪風雨猶鳴嵗寒後彫者其嗣世綿逺厥有由哉公鐵務七世孫也曾祖某祖某父某公幼而穎異長乃問學孝悌之行稱于一鄉翺翔里選壯歲不達退治燕游盡山水漁釣之樂内外族屬朋友鄉鄰急難死喪於焉取給躬行允蹈德義不愆罔知于天得數不永卒享年四十四實某年月日也娶某氏生男某女三人長適某次適某以某年月日葬于某鄉某里某山之麓某泣丐銘某以某忠正之後也銘之銘曰僖氏得姓乾符祀世載勲烈史莫紀詰其存者略可指司空總戎巢穢洗清宫反正亂僅弭子有棨􅀢嗣其址官聮常伯炳煜煒􅀢位特進益峻峙懿僖以降國愈痏神鼎誨盜起環視鐵務舉宗以蜀徙孟氏踵武滅臣軌乃心豈忍攘竊耻堅磨不磷竄茅葦開基雙石此其始傳至于公盖七世烝烝衎衎懿其履死葬茲壤纍以巋忠烈之裔後毋圯馮隠君墓誌銘蜀士有不由科舉奮布衣出萬死不顧之計持危排難登名太史氏之籍自近臣以來吾得一人曰遂寧馮康國隠君即其考也隠君於諸子獨以康國謂必貴康國偃蹇學校年四十餘未售隠君勞勉益謂即貴不疑已而康國客三呉見今前宰相張公相與定匡復大計授奉議郎兵部員外郎出撫諭川陜康國拔起諸生驟遭逢光寵全蜀聳動所至道戢戢企踵爭矚望縣令治道路傳舍郎守郊見視館謹餼餽燕勞兢兢懼不及事於時鄉父老豪長者争入賀視隠君辭色不異平日康國留佐川陜宣撫司入奏事遷朝奉郎翌日謝從容懇願以特恩授父上大喜授隠君承事郎踰年復請以一官易父服色上特賜隠君緋魚累遷奉議郎其後康國為左司郎中出師䕫門任川陜茶馬勢益盛隠君愈抑抑入閭里貧賤故人輒傴僂出其下久之康國不幸死門生故吏解去不顧門户日凄冷鄉鄰為之慘沮隠君故不見頓挫日飭治家事課督諸孫誦説亹亹不厭倦遇故舊抵掌談笑輒終日夜晏然若初無康國者盖又若干年年八十三以夀終將葬其子平國等以某甞知於其兄來謁銘章孔子曰得見有常者斯可矣若隠君歴一時得喪之節可謂有常矣銘宜不辭隠君諱某字某曾祖某祖某父某娶李氏生九男子長康國終右朝散郎直顯謨閣主管川陜茶馬次經國次過渠山簿次大雅次輸次逾皆早卒次平國次定國亦先隠君十年卒孫男五人震通泉尉鼎豫履濟孫女五人未笄曾孫一人隠君卒於某年月日葬於某年月日鄉曰某鄕原曰某原銘曰瘠之生不腴沃之生不枯視其所出以𣙜其所儲斯銘之藏庶幾不誣李時用墓誌銘自余少時從事先生游學東州見合陽李時用時用年已四十餘矣一見相愛重解衣衣我出入其家如子弟别去三十年時用死矣其二子悦觀求誌其先人之行自合之萬則餘千里自庚申至癸亥凢四年其間四五徃返固請不懈感念疇昔且重違其誠也不敢辭嗚呼時用為布衣諸生不幸不有得於時潛德隠行無所表見而死其何以自託於論次之間哉雖然禹稷伊尹其功德見於後世者甚大至孔子以柳下惠配伊尹孟子以顔回參禹稷盖以其㣲而知其著以其所嘗見卜其所未見故融其心跡斷然與之而不疑如時用孝悌慈恕誠實惇静充之身施之家推之鄕黨朋友淵然充足沛然甚有餘也其道之終窮浩然而有處也使時用得志以充之身者行乎人以施於家者存乎國以推於鄕黨朋友者行乎天下以其道之終窮而浩然者處乎富貴利達安知其事業不銘鼎彛光竹帛傳無窮也然而卒無以自託於論次之間者嗚呼惜哉時用其先系出隴西從唐僖宗入蜀醜五季之亂不仕浮沈梓遂間藝祖受禪有詔唐衣冠之在蜀者賜閒田以居由是占籍於合高祖承顯曾祖昭象祖賓考天輔孝謹人也心甚喜之後二十二年餘以事至臨卭其子某來謁泣拜具言父不幸棄諸孤盖若干年矣鄕人某為狀其行重惟先君獲事君子䝉維持䕶䘏之恩知先君介介無他宜莫踰門下願丐銘章用終死生之惠追惟疇曩為之泫然屬老病不任叙載又不可無一言於故人舊交姑繫狀以銘曰堯舜周孔與天罔極邈不可及顧其下愚是為桀跖上下之間為善宫壇綽然以寛充其大端賢知是班小以成小其猶足觀伊維其趨以善為徒不迂不愚用大或拘以小則餘善以為址沒身不耻以遺其子恂恂濟濟嗚呼彦質亦以不死銘茲幽石永貴蒿里雜著書郭秦公事實後契丹乗石晉之敝得其所欲故狃於前利而有景德之寇真皇一戰却之勝而不殺曲從和議自是南北之民休養生息盖百有餘歲天地恩大也然敵自此益驕蹇時出不遜語揺撼中國有不可忍者亦由景德含容不究天討彼雖敗北而去終謂中國畏之靖康之變神州赤縣蕩為茂草其禍又大於石晉自此輕侮中國則又非前日之比異時不待較而可知之雖能掃清中原然非若漢光武唐太宗馘其君長空其巢穴奪彼大阿持其柄指銳鋒以嚮之吾懼中國終不可以為國也然而天下皆曰未易言也不知禍福倚伏之數理亂消長之機天時人事忽有符契其事易於反掌書生固不知兵理勢不容不識常恐溘先朝露不以其身親見之中夜以思不覺攬衣而立河西郭時聖出示其曾大父秦公奏議其言蠢爾弄兵又何畏憚合八州思漢之民一舉可服秦公平生用兵筭無遺䇿非僥倖一勝者是時西有元昊之擾朝廷方悉力支吾而秦公敢出此言必成筭已定敵在目中矣安得起公於九原與之商較今日事機哉濟水入于河答人書説四事洪範五行一曰水水五行之先也五行至靈至神非人理可得而推在天為經星又為緯星自為經緯以致用在地為金木水火土為八卦為人為禽獸草木為温凉寒暑相生相克自為君臣父子夫婦無毫髮之物不屬五行者亦可謂神靈矣既神既靈則濟水入于河能不混雜又溢為滎神靈之所優為者子獨見於水合水則無别故為是説此已意也以人理言也四瀆江河淮濟以其不為諸水所并自朝宗于海故祀以為瀆如子之説則祀典之内一瀆廢矣䕫子之東不一里江之北岸沙石中有鹹泉可以為鹽深冬大江水落石出月明霜清人見此泉如白練自江南横截大江而北此耳目之所見者孔氏注傳於義理或踈至於山川名數之精覈豈後人所可髣髴子不惟是之信又欲刪改經之正文曰浮于漯達于河者不可之大也切以為戒切以為戒舜命䕫典樂教胄子堯舜之時無六經諸子百家欲教胄子將以何書古之胄子未學時亦今之童䝉也必先之以誦數既無六經諸子百家使之誦習何語誦習樂章也詩言志歌永言志者心之所之所之有二正與邪而已孝悌恭儉慈愛忠信正之類也淫侈悖慢驕矜詭詐邪之類也詩言志所言正之類也必非邪之類也自童䝉使之誦習正言既誦習必從而歌之又從而被之金石管絃邪心何自而生此教也教由外也舉其外如此必能感發其中心所謂樂則生生則烏可已者此所以教也若子之所言寓所畏於樂古今聞畏刑也未聞畏教也至於以樂之緒餘用於天地鬼神此尤害理者愚曰使天神降地祇格人鬼享此非精誠有以感格何以得此以堯舜為祭主以䕫典樂是時無樂工惟用所教之胄子以為工君臣上下無一人有毫髮邪心者所以感格天地鬼神至於鳯凰儀百獸舞此樂之大成也教胄子樂之始也請深思之堯典謂之虞書詩書經聖人刪定皆寓深㫖堯舜文王孔子心所敬服以為古之聖人無如是三人之德者故詩書之首示尊敬之意尊敬之意何以見於書之首尊堯詩之首尊文王尊堯故堯典曰虞書尊文王故闗雎以下繫周公鵲巢以下繫召公何以見其尊堯尊文王凢人稱天子曰陛下太子曰殿下朋友親戚相問訊尺牘徃來曰閣下足下尊之不敢直指其人故堯之史而曰虞書文王之詩而曰周南召南也然則何以不尊舜舜為堯之臣既借舜以尊堯矣無以為尊也然尊堯則舜可知其德同也六經之首皆有所尊易尊乾春秋尊王不敢以彖象之辭繫之於卦辭爻辭之下特與他卦異者所以尊乾也元年春王正月元年春天也王即次之然則自天而下無尊於王者此尊王之㫖也禮樂無完書使見完書決有㫖意盤庚遷都商之累遷商之故事也成湯伊尹之意也臣民安於無事縱逸成俗則遷國有大故則遷縱逸而必遷者盖縱逸生於無事今之富商鉅室或有遷徙經營卜度極其力不三年不成其間慶弔婚嫁徃往而廢况王都乎方遷都未定雖中庸之王尋常之士大夫淫侈㳺畋之事有所不暇故商之先王以遷徙勞役其子孫臣民以損其滛侈酖毒之事故其首篇曰先王有服恪謹天命茲猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命先王有服者先王有故事也不常寧者常寧則縱逸之所由生也國有大故而遷者棄舊從新變其臣民心志思慮以迎惟新之慶亦常理也又勞役以節損淫侈之意亦在其中矣故其中篇曰古我前后罔不惟民之承保后胥慼鮮以不浮于天時殷降大虐先王不懷厥攸作視民利用遷當降大虐之時不懷故居視民利用以遷違禍而嚮福新其民之志慮以迓新祉也明矣盤庚之遷必由縱逸是故其民懷安而怨若有避禍則不待告而徙矣先儒往徃謂盤庚不明言遷徙之故盖不詳其文盤庚言王播告之修不匿厥㫖又曰予若觀火其中稱先王故事章明切著如此豈有隠藏而不布告者當時臣民皆知有遷徙故事故盤庚可率以遷不從其遷而殄滅之亦有辭矣不然强民之所不欲適所以致亂矣以縱逸而遷有大故而遷皆言天曰先王恪謹天命罔知天之斷命又鮮以不浮于天時者天行健十干周流晝夜不息率十日而一周君子以自強不息當法天也可常寧可懷安乎商以十干命其子孫曰甲曰乙曰庚曰辛者法天之意也書孟子指要後余讀太史公書見六國合縱連衡疲於奔命以次滅亡未嘗不掩巻嘆息知仁義之道為古今安静藥石當是時孟軻氏和為飲劑扶而沃之六國君臣斷不肯下咽馨香所及輒哇噦反走甘心於游説攻戰之鴆毒孟子沒不百年皆溘然無一存者秦最後發狂嘷呼以斃如亷頗李牧平原信陵之屬當時以為賢後世猶仰之彼適足以厚其毒促其亡而已孟子所謂善戰連諸侯辟草萊任土地當服刑戮者也秦滅漢興劉季天資與仁義暗合方之三代猶十跌其七八已能維持大業為四百年之久嗚呼孟軻氏仁義之説何其信而有徵彰明切著如此武信劉誼夫盡心於七篇之書離其事合之各以其類相附開巻了然若指諸掌謂之孟子指要余語劉誼夫宜益考太史公論載列國滅亡大槩與其嵗月去孟子若干而附於孟子之文之次庶後世明知三代用仁義之福戰國棄仁義之禍如是而孟子之言益尊且信也劉誼夫以為然故書以為指要序題跋題定軒堅師紙扇子以是風之所由生邪箱篚之所藏几案之所相仍何以飄然之不起子以風之作也其自作也無與於此坐煥宇處煩室何以勞子之臂指子當於其未動而求其所以動於其既動而求其未動之始若然者子且於非風非紙之間坐得清凉之理矣天華寺欲作山亭因題其壁西山千里來朝三峩至丹稜鳯翥龍翔顧望不去而天華寺適當其衝然千楹百棟而無容膝之地可與山相領㑹亦好事者之一疵也一日侍親合朋從杖屨延望於其西北之郊相與嘆而言曰爭名者於朝爭利者於市此亦邱壑之朝市也立藩籬植薈翳以自謝絶天地英靈神秀之氣其何心哉寺僧文照􅋏然而慙請合其徒之力結亭以補數百年之闕夫士之窮達命也物之顯晦時也朱草靈芝不為瑞於堯舜之時而記珍於千載之下𤣥圭大璜帝王大寶亦復寂然無聞於今之世矣夫物亦何常之有文照果踐其言吾人酌酒賦詩其間一醉此山之神而勞之日生於大化胚渾之初始見賞於今日可謂晩矣此邦之賢士大夫四方之遷人羇客觀於茲亭之上為爾知音者而今而後盖未始有極焉山乎亦可以無憾也落成之日當目為山亭書此令文照掲之以為作亭張本同游者郭信可楊隠甫仲王逸民某侍老人杖履題三緘金人圖余少讀家語已知有周廟金人之戒浮沈人間世老矣而卒蹈其禍盖誦其文而違其實者書生之常患困而始學敗而後悔者中人之常性今觀趙持正此圖不覺凛然如近氷雪吾其免乎哉題王逸民小景王逸民作瘦梅枯木林壑小景其筆墨難於豪放而易於淡泊髙牙大纛騎從赫奕政自快人而水邊林下幅巾杖屨自别有一種氣象題墨梅花騷人以荃蓀蕙􅊉比賢人世或以梅花比貞婦烈女是猶屈其高調也王逸民以淡墨作寒梅雙影以見貺余目之曰此孤竹君之子也座客頗以為有見之言跋墊江廖持正二記墊江廖持正作法華禪寺法堂化先度法橋二記不逺數百里馳以示縉雲子以求印可夫世之學道者與之説有則滯入形相與之説無則流入虗空如狗逐塊無有是處持正拂去兩邊妙主教外甚為竒特然在縉雲門下别當下一轉語鳯凰非人所常見或人自謂親見鳯凰人爭問之鳯凰何所似或人答之曰首如雉而華好羽毛五色尾數尺許足如鷄其立髙如人衆皆信之又問不知何食或人曰食榖衆皆撫掌大笑余因戲謂持正曰有人問鳯凰何食切毋答以食榖也持正見此亦􅀿捧腹絶倒矣跋㑹景堂記余同眉山唐立夫觀此文古渝山川風物古今盡於此矣余讀之莫之許立夫論文章多不可前人獨謂此為竒作以立夫之言一再復然後見其汪洋紆餘之體其間云北岸有塗山南有夏禹廟塗君祠以今考之南北誤矣當改為東岸有塗山山之麓有夏禹廟塗君祠云跋山谷書木假山記黄太史用筆調和收藏遒勁之氣於筆墨中無一㸃暴露俗人見他人書如寺門前金剛筋骨俱露便謂魯直無力可為一大咍也跋東坡畫論蒲永昇畫遇東坡先生可謂幸矣後世伎藝如永昇或不難得而收名定價則曠絶無人三復斯文重興嘆惋跋老蘇書帖此書法律不足韻度有餘蜀人本不能書元祐間東坡始以其筆畫名世其法雖出於二王其實已濫觴於老蘓泉源中矣樂府和賀方回青玉案寄果山諸公年時江上埀楊路信拄杖穿雲去碧澗歩虚聲裏度疎林小寺逺山孤渚獨倚欄干處别來無幾春還暮空記當時錦囊句南北東西知幾許相思難寄野航蓑笠獨釣巴江雨虞美人詠茶䕷東君已了韶華媚未快芳菲意臨居傾倒向荼䕷十萬寶珠瓔珞帶風埀合歡翠玉新呈瑞十日傍邊醉今年花好為誰開欲寄一枝無處覔陽臺又芳菲不是渾無據只是春收取都將醖造晩風光百尺瑶臺吹下半天香多愁多病疎慵意也被香扶起微吟小酌送花飛更拚小屏幽夣到開時又重陽詞去年同醉黄花下采采香盈把今年仍復對黄花醉裏不羞斑鬢落烏紗勸君莫似陽闗柳飛伴離亭酒願君只似月常圓還使人人一月一回看漁家傲冬至雲覆衡茅霜雪後風吹江面青羅皺鏡裏功名愁裏瘦閒袖手去年長至今年又梅逼玉肌春欲透小槽新壓氷澌溜好把升沉分付酒光隂驟須􅁷又緑章臺柳荼䕷已彫落賦天仙子風幸多情開得好忍却吹教零落了弄花衣上有餘香春已老枝頭少况又酒醒鶗鴂曉一片初飛情已悄可更如今紛不掃年隨流水去無蹤恨不了愁不了樓外逺山眉様小閒居十七年或除蓬州二月到官三月罷歸同官置酒為賦㸃絳唇作别十日春風吹開一歲閒桃李南柯驚起歸踏春風尾世事無憑偶爾成憂喜歌聲裏落花流水明日人千里玉樓春杏紅㣲露春猶淺春淺愁濃愁送逺山拖餘翠斷行蹤細雨踈烟迷望眼暮雲濃處輕吹散往事時時心上見不禁慵瘦倚東風燕子雙雙花片片㸃絳唇江上新晴閒撑小艇尋梅去自知梅處香滿魚家路路盡疎籬一樹開如許留人住留人不住黯淡黄昏雨又眉黛低顰一聲春滿流酥帳却從檀響漸到梅花上歸卧孤舟梅影舟前颺勞心想岸横千嶂霜月鋪寒浪送史誼伯倅潼川作夣蘭堂小雨清塵淡烟晩官柳殢花待暖君愁入傷闕眼芳草緑斷雲歸鴈酒重斟須再勸今夕近明朝乍逺到時暗花飛亂千里斷腸春不管驀山溪艱難時世萬事休誇㑹官宦悞人多道是也終須不是功名事業已是負初心人老也髮白也隨分謀生計如今曉得更莫爭閒氣髙下與人和且覔箇置錐之地江村僻處作箇老漁樵一壺酒一聲歌一覺醺醺睡縉雲文集巻四
