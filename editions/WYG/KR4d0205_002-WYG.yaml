body:
  text: 縉雲文集巻二宋馮時行撰七言古詩遊君山值冰合不得進東畧扶桑還掛席朔雪顛風經赤壁欲呼龍伯出珠宫戲上君山吹玉笛仙人未熟長生酒故遣𤣥冰凍湖口洞庭千里一鏡中煙鬟黛抹空回首丹經素書舊巖丘長歌歸去吾不留他年酒熟當勸客鶴使相尋縉雲側題張粹夫萬巻樓儒生讀書不貴書枕頭閣脚醉夢餘反不若浮屠寳貝為函金作字海龍扶出凌空虛君今收拾一萬巻置在髙樓截雲漢想當日月出沒間玉軸牙籤互璀璨我欲牽車駕黄犢往發縑緗焕心目論孟久荒縁老病請君為我刪嚴令宴林簡州桃園樂昌溪東大江頭脫木老屋風颼颼開門滿院種桃樹桃花主人林簡州明年二月爛照眼簡州西川醉春晚憑誰管領江上花但寄玉醪三萬盞為君對花連日夜飜杯作雨雨花下使桃大如王母所種髙參天直使花氣連西川送召客暮春送客朝明光顛風吹花繞柂檣大江吞天日出沒赤心許國一葦航平生夢躡螭龍尾天門九重九萬里一朝巨手開天闗丹極紫霄隨步履兒輩端非五湖匹國柄今歸謝安石遙之别墅清晝長笑拂楸枰行折屐共傾東海洗乾坤景仁況是名公孫四郊多壘士之耻富貴浮雲何足論宦海十年風退鷁我亦彈冠聽推檄安能鬱鬱久居此朔飢欲死心不死和張仁甫李花韻江頭誰家千樹李影落清江徹江尾風吹扁舟到花下花間啁啾亦欣喜瑤林成徑千步長花光燭天天半香恍如坐我羣玉府飛瓊酌勸青霞觴勝事此游難具列照映肝腸盡明潔老懐已戒語作綺新詩向擬風回雪東家西鄰詩更竒一時共借花光輝更須妙索留春句無使花飛春告歸李花已盡再用前韻末章専屬蒙景明資一笑也向來風前見桃李今日紛紛落風尾老人於花亦何有不用天公事嗔喜漫天髙跨風力長更飛急雨湔餘香雪兒歌底踏舞馬燕子泥邊隨濫觴明粧皎皎争前列觸手還羞疑不潔芳菲已斷陽臺夢只有消煩嚼冰雪明年秖應花更竒豈無方畧留春輝欲作短章憑阿素只待西隣之子歸李彥澤紫雲洞玉帝侍臣紫雲翁帝嗔謫居跨鼇峯年齡瞬息反帝所空有衣冠藏山中山中草木俱不同紫雲霏微氣鬱葱風清月白巖穴空翁猶被髮乘虬龍來從南箕驅長風人間奔趨争追蹤依稀可望不可從披尋遺編三復重舜庭絲匏間笙鐘嗚呼翁兮終莫從姑從遺編愈肓聾峽州楚塞樓東南上流蜀之門領畧形勝斯樓存岷峩之西江發源勢如建瓴注平原出門頓息波濤喧五溪七澤相吐吞蜿蜒紆餘帶城垣山亦却立且踞蹲排青疊翠來庭軒座隅髣髴聞清猿我來新律當正元天地清夷日晏温主人延客開清樽酒酣疎襟忽孤鶱北望兩京手可捫感時撫事銷客魂比聞敵幟猶繽繙躙躒海宇胥分奔赤縣神州宜細論翠華㡬時驅育賁歸挽天河洗乾坤願見從來中國尊老夫日拭雙曈昏遊峩眉向來一紀登臨意白髮頺齡才一至阮哭窮途真可笑孔小天下或如是平生厯覽廓無礙方稱老懐疎不緻安能却粧住雲霄更不婆娑下平地杜如篪屢督烹茶仍作詩次其韻老寄餘生山水窟寂無朝煙屈硉矹客從何方問棲隱無人譍門杖藜出言間遺我翠玉餠把玩芳香襲呼吸便欲洗琖試水品腸胃空枯恐稱屈緘藏小篋掛東牖惕若虬龍隨手入雲濤雪浪有變化扄鐍苞苴何鬱鬱痛嘗七盌豈不願待營一飽終無及窮人談富如畫餠浪説烹炮詫知識真求大嚼薦茗飲可笑詩人太癡絶豈惟枵腹誤指染更并麗句成乾沒亦知且具衲子供澆淋蔬筍供一啜恐君肺腑出宫商造物反怪太喧聒又恐展轉夜不寐深思危慮比孤孽何如待我食萬錢東閣大開玉醅潑翠娥捧香沃煩膩醉起一笑天地闊男兒蓋棺事始定所不踐言有如日廣安朱義從為渝上霜臺之客母夫人年八十餘極其孝養一日有三白鷺翔集中庭不去義從作翔鷺亭識其事縉雲子為賦此詩振振鷺鷺于飛白華遺音詠潔白故此翔鷺呈鮮儀萱堂八十癯僊姿無心更出風絮詞夜入佛觀燈耿耿晨翻貝葉多髮絲郎君風標晉人上芙蕖照映清漣漪晨昏定省履聲細鷺兮飛躍隨彩衣吾聞擊石百獸舞又聞上世巢可窺余生眼明見異事感今懐昔為此詩山中宿小民家夜聞虎因有感虎叩門山風裊裊吹黄昏編蓬為户隣虎穴敢於虎口寄浮生干戈時有人相食吏猛於虎角而翼虎叩門不敢入使我愴惻長嘆息正月二十日上山莊二月晦日歸不見花山巑岏立屏幛山上無花不見春下山花落空惆悵嫣香空後芳草萌芳草萋萋愁更生子規啼血不見花春又别我天之涯和張仲山寄酒兵厨盎盎孚盈缶憐我十年青濮口投醪分惠繼以詩詩更分香過於酒酒瓶詩巻墮我前頓使幽棲添二友朝吟直到屋翻日夜醉不覺山銜斗也知庭内無留難掃除弊事如揮帚龜陵千里數萬家誰不髙擎加額手公餘退食多燕衎一斗百篇困何有餘波借與草木春況是江頭釣魚叟更煩遣騎日聮翩暖熱縉雲先馬走䕫帥范太尉生日秋空無雲倚太阿天駟不受金盤陀英姿傑氣狹宇宙却立引手攀明河已辦長纓三百尺縛取單于寄飛馹徐揮白羽掃龍庭停驂戲勒燕然石落落雄圖九萬里白帝屈公朝夕耳天使中興氣象自公還還當與公金石年恭州楊倅生日鳯龍虎豹無凡文墨池太𤣥之裔孫至寳不琢粹璞具猶有太古羲易淳渝州别駕未足論嘯歌已是騰清芬一錢不輸縣官手飽食長歌耕壠雲生朝佳氣氤氲集歡聲一境聽洋溢願從黄童至白首年年擊壤歌君夀劉守生日天清地浄行清秋帝命吉祥驅蓐收九霄墜露濯仙骨冰壺翠鑑塵不留十年持節東西州繡衣輝煌照遐陬山之岷峨水之涪兩川至今騰歌謳渝城突兀大江頭豈足滯公霄漢遊鬱葱之山海上浮上有仙人老浮丘玉井蓮開花作舟載公縹緲登瀛洲瓊瑤之臺白玉樓霞裾飄飄海上遊仙人吹簫勸黄流一觴不老仍不愁始知仙凡隔塵土人間衮衮真浮漚常君挽詞龜城之山龍蟠崛山下佳城何鬱鬱一抔黄土百年心數字寒旌萬里骨風愁雨悲春色死生長何方葬於此亂離溝壑半公卿不得如君君有子我生苦晩復異縣平生不識先生面但聞其見元祐時傷今思古為此歎石孝立挽詞斯人已矣舟移壑惆悵九原誰可作靈光長與孤月孤幻化偶隨落葉落人間好事平生有留得芬香傳萬口楊侯宅畔蜀江邊霜立梅花醉哀酒伯仲如林吾所愛俯仰十年無一在鬢邊日月去如飛老懷不待秋風悲五言近體題香積寺撥草詹風日招提重訪尋雪如將路斷雲實助山深密印傳初祖英風嗣少林我來聊借榻静夜聽龍吟天華寺亭二首老去心如水眼明猶愛山偶來出已意特為破天慳能使渺茫處盡歸尋丈間公餘成踐蹂心事等雲閒又一亭開浩蕩千載納幽閒日色射丹巘秋姿凝翠鬟人家屏上見鷺㸃鏡中還冷宦驚人眼無妨飽看山遊東郊以園林無俗情為韻得情字二首野寺日欲落晩林煙自生霞文明逺水鴉㸃背孤城酒盡無聞酌茶粗得老烹歸來喜不寐濩落稱余情又散漫藤蘿外飄然猿鶴情雲山如有舊草木半無名隔竹寺幡出前村砧杵鳴乾坤清絶地猶覺是昇平詠雪疎木墮栖鳥寒潭悲卧蛟與松為老伴喚月結清交簷滴冰為筯梅添玉作梢豐年何以報作頌紀南郊阻雪朔風飄正急客況老難禁問路迷南北攜笻探淺深地驚盈尺許盃喜十分斟梅蘂如相識暗香何處尋寄張昭度知君多暇豫山縣少追胥日晏未鳴鼔夜分猶誦書相思千里外一見二年餘錦水連三峽時通雙鯉魚臘月二十八日晷景餘三日憂愁盡一年酒侵新歳熟花待故枝妍隣里多遺餽庖㕑有盛煙擁爐風雪順春意欲相先除夕峽裏江山暮愁邊日月窮酒濃新不飲春近舊多慵嵗事横胷臆年華入鬢蓬明朝有王會心與蜀江東元日二首穀旦休祥見元朝氛祲開日車扶曉出斗柄幹春回致理歸廊廟私憂尚草萊太平豈無象天意是胚胎又日月新年節乾坤舊觀還鬱葱浮曉霧紫翠動晴山御氣籠宫闕朝班雜佩環遙知王㑹散喜色粲天顔和何子應盛山一首徑掃風雲浄爐薫山谷香青葱環暗壁金碧跨崇岡小雨留歸斾飛霞落酒觴干戈遽如許稅鞅更何妨和何子應記所見公事有餘暇披衣繞風林髙吟起髙興閒事引閒心未種淵明桞方鳴子賤琴㡬多疎散意矯首亂山深清明律厯調元氣氛埃廓景風清明歸在宥顦顇得沖融日御元來正王春自昔同野人看氣象暫覺百憂空寓興乘軒知有負啜菽苦無歡萬事等一夢寸心當自安荆卿甘度易李愿喜歸盤黙坐發深想春山猶夜寒彭山道中劫劫真無謂遲遲再有行斷雲峰出没殘照水分明逺意誰能共長亭空有情從今離别夢逐夜到江城旅興寄張惠之始覺歸耕晚從誰話此情但能安食息敢復計聲名留滯煩書信艱難愧友生有懐悲不盡歸鳥暮雲横舟中見月濮上今秋月於人大有情銀盤隨水湧素練截江横岸闊天光近舡虛夜月明寒光迷上下萬里一心清送友人兄弟赴省書劍一門去由來得主盟峩冠雖合遝再鼓已聾盲風急鴒原起雲髙雁序横天衢在咫尺去去任飛嗚就得勝寨遣人入巫山買酒聞道巫山縣秋深好白醪形神須此物觴詠本吾曹馬杓勝鸚鵡羊􅅅當蟹螯暮寒催渴肺徑欲賣青袍白雲安尉出戍至䕫州戍鼔黄雲外征夫白帝東風林行嘯虎雨夜䬃哀鴻路入山光静村含晚色空嵐煙欺眼力不見鹿皮翁至日三首太史書雲日周家紀厯年一罇供笑裏五載客江邊城暗催春雨山連作雪天功名驚過隙節物自推遷又至日寒無賴今朝愁奈何兩宫黄屋逺二老白頭多聖主今嘗膽皇天忍薦瘥乾坤為回首慷慨一悲歌又令節仍長至公家放小休愁城開六府醉眼見千憂梅蕚含春小雲容帶雨收曦娥自來往生理百年浮遊寳蓮寺分韻得塵字路出青山近招提更可人清心鐘磬響逺跡簿書塵晚日池邊迥秋風杖履親頻來一樽酒不畏老僧嗔楚甸江頭望雪晴二首歳暮風欺客天開日解圍雪消無奈白雲細不禁飛目盡江無盡吾歸雁亦歸曉來清徹骨塵物汚人衣又晴天開澤國江渚匝煙圍鷺静蕭蕭立梅孤黙黙飛岸荒羣虎過村迥一人歸愁緒如相惱帆收徑典衣遊樂磧江中石洲石出杖藜穩沙暄牽興長半江鷗鳥地三峽水雲鄉攜客撑煙艇開樽俯緑塘便當從此去煙雨釣滄浪行遇小雨小雨暗兩岸孤舟撑一篙清同寒鷺迥愁與暝雲髙已判亂波色時饒㸃鬢毛三農有重賦為汝喜如膏䕫州撫屬陳行之座上作雲細不成雨虛從萬里還卸㠶逢故舊把手話間闗酒濁消千慮春新見一斑便須開口笑白髮不勝刪至日讀莊子世路頻時節山城暗夕煙酒先回暖律梅自斷殘年日月長江水功名小井天如何割幽抱更與問虛𤣥謝景濬卿東州名士未曽傾蓋因僧悟䇿有詩寄余臭味不殊千里同契望風増感作詩寫懐一首寄謝客唱凌天路僧傳到野亭人間聞譽處句裏識儀形學道荒文律嬰愁鈍性靈只如老瞽史音節尚能聴歳暮舟次荆州呈李堯俞肅霜聞渡雁湖海發歸舡煙樹開吳澤風㠶盡楚天經過成往事信宿是明年詩句隨元禮雲山共一天舟中觀雪呈李堯俞二首孤渚凝寒睇斜風看亂飄已狂難自定初泊不勝嬌白向水邊斷輕來衣上消更愁清夢覺篷底聴蕭蕭又密雪晚來急扁舟江上看凍雲千頃白對我一襟寒屨冷深猶立巾欹重更彈家山想同夢夜倚玉欄干自行在解維宿長安閘下回望天竺諸山依依在目微臣去國撫亊感傷因成此詩歸來豈不好去國意如何主聖憂思切時危習俗訛山髙更回首天濶阻悲歌一寸丹誠地餘生感憤多再登岳陽樓樓髙臨迥渚天闊上丹梯雲盡樹不去水平天更低江湖分去住吴楚亘東西遐矚寛幽抱愁多望轉迷和楊團練元韻此生渾褦襶秋鬢漸鬅鬙跂徳山徒仰雄談壘更增奇謀閒袖手佳句老傳燈起我棲遲意寒鳩欲化鷹同王公佩和老杜韻新長篔簹竹傍穿薜茘墻夜須邀月坐晝不待風涼剰放梢添緑斜將籜抱香幽居絶還往相伴興何長又弊屋甫環堵此君憂面墻當忩蔽寒緑入坐薦清涼客詠閟餘響佛薫留散香老成看氣骨霜雪表靈長和丁利用韻末路初傾蓋春風一繫舟英姿森劍㦸餘論有春秋時事朝暮别年華日夜流徒勞是州縣東去勿遲留和何子應遊西山乘時休杖屨勝槩洗塵凢屛障開蒼壁龍蛇拔老杉水明花並倒山疊玉相攙卜築公相可吾當住翠巖又和子應遊萬州岑公洞泉細或疑雨巖深微見天暫來如可老長往不難仙石髓層層落松聲樹樹傳欲歸重回首明月傍船舷題友人南北江山圖地廓秦山壯天涵海甸寛十年經眼處萬里入毫端户牖開千嶂風煙老一竿已無圭組累圖畫不空看送涪守何常卿十六韻一時周屏翰千載漢循良寵渥分民社疲羸賴紀綱洪恩隨雨潤令問與風翔日月流年駛江山别恨長已聞談舊政方改視新章賤子千官底曾依數仞墻迃愚真濫吹浩蕩實包荒倦鳥棲林樾哀鴻顧稻粱一􅆵聮户版餘惠及耕桑迨此徴黄速還聞借寇忙江雲引行斾峽樹逺歸檣亟欲承顔面於焉寫肺腸麥秋驅病馬山雨絶横塘意去如飛鳥身留類觸羊登臨空悵望竚立更淒涼眷注期公久趨瞻預可量西山一首有客徵清賞攜笻上翠微雨差肥水面春恰染山衣破緑苔迎屐藏寒竹擁扉雲融開别浦天浄見孤飛語響留舟壑杯光艶落暉和李工部月夜天地渾無滓清光濯肺肝倚風哦絶唱想像見仙官照我竹書冷戀君銀鬢寒家山想同夢倚玉夜䦨干題王與善隱軒苦節風塵際甘心季孟間禄微㡬飲水眼冷只看山江緑鷗千㸃簷踈月半環飽諳清浄趣渾未覺天艱春日題相思寺繫艇依寒渚扶笻上晚林山山春已立樹樹雨元深掃葉移床坐穿雲買酒斟相思思底事老大更無心山居溪帶三弓地山開一蓋天茅簷低没霧藤路細迷懸惡草飜新耨獰彪突舊穿争鷄喧腷膊静鷺立攣拳翠著衣襟濕嵐薫草樹鮮老夫甘廢棄末路寄沈綿水出桃源俗人來谷口賢心期如水冷世事絶風傳瘠瘵髙眠穩疎慵入静便酒缸開半熟茶餅索新煎温飽無餘事安閒得剩年勝遊欣此始妄想置從前出處非吾浪乗除計亦全況因心地静粗了佛家縁零落餘生在寧無火裏蓮送楊元老召赴闕羣心周道直萬國舜門開咫尺清虛地精微擇異材光輝生錦里合沓上蘭臺霄漢横髙翥風雲接大來龜龍紛秘奧奎壁煥昭回碧海浮城闕丹梯近斗魁由來陞密勿此地實胚胎早晚龍淵躍從容衮職陪斯文歸黼藻吾道久塵埃漢武威懐逺周宣正化恢治源先簡儉國本厚封培造膝心終啓前籌力竟回正宜須弼亮豈獨藉淹該疇昔先登際聲名亦壯哉追風先蹙踏戢翼更徘徊巨寳應難價殊姿肯自媒中天懸日月萬里忽風雷戮力銘鍾鼎餘波及草萊故人元勃窣晚節更摧頹料想憐枯肺吹噓助酒杯送張仁甫見何少卿續郎中二首并州天下脊人物見遺英亂復歸何處貧甘送此君天髙卿月滿雲静使星明二老恩波闊扶衰强一行又水驛風煙暝江郊茅葦秋不闗窮易老自是客多愁自倚速城價終艱一飽謀向非天下士强項敢輕投月夜秋立雨新霽氣清雲自消地空銀海闊天浄玉丸跳把硯承明露扶兒看碧霄病禁淒冷得不惜到明朝遊峩眉十一首聞説最佳處深藏疊嶂間只須一兩屐更入數重山架竹深猶渡埀藤險可攀林泉未厭客風雨不教還又薄宦非初志幽棲有宿期勝遊宜數數老境已埀埀山好無時見雲閒逐處隨誅茅或未可細路有人知又蜀公愛山水無不到牛心歳久無從問詩亡不可尋雲堂環碧嶂溪路擘青岑從僻須回杖窮探不厭深又絶嶺人人到空迴亦大誇至人觀實相凡眼眩空花有障猶隨牒無心已出家普賢吾日月歸屐候晴霞又緬想如天逺由來路不賖快穿靈運屐徑造普賢家仰睇雲霄逺回觀錦繡華老難持浄戒細細酌流霞又萬山皆拱揖蹲俯若臣隣初到最髙處誰為第一人自驚渾俗骨或湧半天身初夏猶深雪難忘數飲醇又豈但山儲秀年多樹亦靈往來供静矚參井入危經幽討真殊絶神光却渺㝠正當存不議聊使俗迷醒又巖巒皆創見草木半無名翠削山山玉光搖樹樹瓊嶺雲隨客袂谷響荅僧行清絶渾無寐空山月正明又攙天元有路絶俗更無村孤眺臨崖觜危升挽木根渺茫均逺邇倐忽變明昏佛現驚搜句巖前萬口喧又佛已歸無跡吾當反自崖肺腸蠲墜露衣佩結明霞陶令難忘酒龎公亦有家下山人借問姑射咤南華又雖知仙可學酒盞喚淵明未遂山中隱聊為地上行留人埀雨意送客走泉聲初上乘危慣歸途更不驚雲安下巖二首繫纜江沙静杖藜巖谷春花依竹色好草入漲痕新占笋苔初破嘗梅客遽顰篙師勿槌鼓幽興苦留人又曩遊成斷夢再至是陳人攬景追前跡尋詩拂舊塵孤松難破凍細草易生春晴日江天好凭欄愁更新題梵音水野亭黎州三宿離桑下棲遲向一年無來元謾爾欲去也凄然峽路梅隨馬呉江栁繫船此生無再到題字寄山泉題黄氏所居環翠五六里深藏三四家風髙鳴雁序春暖茁蘭芽門巷分楠直溪流帶竹斜我來風雪曉倚杖看梅花遊雲泉寺人日訪山寺春風能借温栁橋通野水栢徑隱重門泉竇來何處梅花别有村從容尋後約假榻卧雲根假守蓬州視事二十日以臺章罷黜行至温湯作此以寄同僚二十韻聨事春將半去官春未歸儒冠真蹭蹬祖席有光輝罷遣親刀筆勾牽坐釣磯同寮多俊彥投老失親依坐席邱無煖扁舟蠡亦肥泉聲清夢寐山色浄裳衣竹杖隨時拄山杯信手揮荷天將土苴為我易煙霏州縣徒勞耳簞瓢殆庶㡬不糜公廩粟元長故山薇白髮心猶壯丹途計益非人生今殄瘁世路只歔欷苦潦人將溺思援手病痱道孤誰嘆息迹蹇共嘲譏去矣猶迴首憂之欲奮飛古今難骨鯁風俗易脂韋深峽真浮海温泉當浴沂空山猿擇木豐草馬辭鞿已遂孤雲逺猶通一徑微年年如問信深覔薜蘿扉荅郭師聖問訊煩書札情親語味長是非元自定得失已兼忘洗手分僧飯清心炷佛香窮城不假給何似水雲鄉石漕生辰夢斷熊羆夜祥呈饋鯉初固應賢有後誰謂慶無餘為國家相似憂民子不如符分四郡虎金佩十年魚未補三公衮聊分八使車權衡公選格陵阜富軍儲閥閲名猶在朝廷席已虛稱觴勤祝頌二十考中書張公升挽詩掃地綠覆牖撥醅香遶墻是非閒處少日月醉中長薤滴悲歌露柯寒落葉霜百年成底事宿草任蒼茫七言近體中秋探韻坤字山雨連秋懶出門嬋娟佳節更堪論一年有限天知已萬里無雲月返魂淡影參差收海岳清光浮動洗乾坤擬憑罇酒相酬荅遮莫沈沈下别村秋日即事人情節物自相闗强不悲秋亦恐艱漸老身危生理索憑髙眼逺暮天寒樹能長嘯風前聽山亦多愁雨裏看陶寫無他仗詩句雁聲砧杵倚欄干秋夜書事燈暗文書隔縠羅寒欹竹枕倦吟哦本來無事消魂得作意撩人奈雨何二十五聲秋㸃冷百千萬緒客愁多海山寂寞應如此琴自無絃一放歌和郭信可秋夜有懐又是山寒水緑秋年華冉冉鬢邊流一聲孤雁人千里三㸃寒更月半樓宦海浮生成底事騷人徹骨是長愁天空地迥淒涼夜一曲商歌一掉頭十七日夜月色尤佳與韋去非東亭小酌秋來瑤海浴嬋娟天上人間又一年有酒何妨三夜看無雲尚見九分圓樓臺迥憶仙遊眼村落遙思禁曙煙斗柄銜山風露冷歸來清絶不成眠食笋錦籜初開玉色鮮烹苞葅脯盡稱賢絶能加飯非無補浪説冰脾苦不便一日偶無慵下箸四時都有不論錢寒儒氣味都休問準擬凌風作瘦仙送孫履道平生心印久相傳出處窮通豈偶然且把新詩斟別酒莫將離恨惱衰年步兵未必非竒士太白惟知是謫僊待我休官彭澤去約君同老白雲邊上知己十年宦海塵埃客文墨於人有底功天逺寧知心匪石官卑不許氣如虹唐雖未老行將老衍不應窮究竟窮何日得君天上去收雲拾雨借長風寄越州張子文待制二首霜清玉潔紫微人海水羣飛蹭蹬頻首尾七年歸剪拂東西萬里隔聲塵酒杯强遣愁中趣藥裹長隨健裏身天逺征鴻飛不到登髙極目更傷神又風塵綿邈想懐家為報平安向海涯壻舊能詩鳴曉雁兒初弄筆抹秋鵶陶張蹇石真心腹四人為幹集家事王蔡韋侯比輔車四人其家鄰里更有梁山何小隱要乗春漲别金華何子應子文内兄金華子應山居盧秀才家食棃屢欵盧仙貢玉堂谷棃霜飽毎分香冰圓咀液涼疎齒金醴吞甘浣熱腸誤誚斧斤訛魯簡駭聴名字笑呉娘好同火棗供嘉品端比蟠桃味更長溪上望居人有感溪上居人三兩家竹籬斜插倚蒹葭清流日暖魚飛浪静渚輕煙鳥印沙鱠落霜刀分綵縷酒傾玉椀泛瓊花因思故國園林約默數歸期定不賖感事詠菊寒花冷艶為誰發霜露泠泠秖汝侵弱質向人如有託清香絶世本無心會逢仙老收靈藥不用騷人費苦吟千載豈無陶靖節東籬蕭索待知音詩呈監試筆陣詞鋒已破堅深深簾幕度微煙紛袍幸免催詩雨堆案何堪造榜天走馬共知難看錦得魚自笑已忘筌芙蓉豈待春風力偶失知音勿斷絃和食笋二首敢將蔬笋擬甘鮮清瘦肥癡定孰賢氣味比僧從淡薄支離似鶴要輕便未隨煙客登山屐且輟江神飲馬錢一歳可能三百把骨青髓緑配松仙又麞牙鴨脚色相鮮更遣逢迎酒聖賢齊魯大邦應自美煙霞清興豈相便風神肯慢吹成竹市老能教省直錢早晚蕭然文字飲何須喚作地行仙早行馬入寒林驚宿鴉羸僮呵手怯霜華已經殘月路數里知過安眠人㡬家嚦嚦曉烏天外唱疎疎煙樹嶺頭斜前程自謂明時近不用孜孜苦嘆嗟新居鑿井飲之味殊清勝因成一首丹砂黄菊莫年須清浄𤣥功世恐無千里長源開地脉數篙寒影落金樞蟄龍雨氣通滄海丹鳯秋風老碧梧事業正應歸鼎飪更分清韻入冰壺曉行得江字晴色招人步曉江牙牙瘦石水淙淙斷雲作片元隨伴白鳥無羣不著雙浄渚鏡磨涵崛屼飛濤雲湧過艂艭煙蓑雨笠吾將老富貴心慙苦未降客丹稜天慶觀夜坐家山千里秋風客搔首夜深寒雨忩萬古興亡心一寸孤燈明滅影成雙鬢邊日月如飛鳥眼底塵埃擬漲江髙枕欲眠眠不穩曉鍾迢逓發清撞苦雨噎鳩喚雨惱秋魂唾手牋天恨少文捲去行雲宜有主放行飛海恐成羣濛濛遮眼尋山逺㸃㸃送愁縁竹聞神女工夫遽如許可能匝地洗妖氛清明寳勒香輪簇桞隂宦遊清味獨沈吟野雲未散山頭暗春水初生岸脚深萬里松濤寒食淚十年萍梗故園心狂風又捲殘紅去飛落誰家無處尋思歸安用區區五斗為竹籬茅屋喚人歸閉門髙卧不通客倚樹長吟懶繫衣秋稻水乾還築圃春蠶桑盡欲鳴機山雲野樹吾家物身瘦何妨道自肥和王祖文河東河北塞煙長誰作今年一葦航已見五龍思自奮似聞兩虎却相傷麟臺君有青雲路蝸舎吾其白首郎憂國憂家連夢寐端知不復有他腸贈李西臺瀟湘濃碧浸青天千里人家接楚田惜别正當歸雁後相思無奈落花前江樓間上雲藏樹野渡初迴月滿船看著行春驅五馬絲絲埀栁拂長鞭索友人賡和詩債遲遲不見還只縁草賦動天顔一揮可但難加㸃三復何消更索斑餘力自知過我輩新篇不合是君慳風流來往無多日肯與吾曹作兩班和陳舜㢸中秋有感三首宦海浮沈久倦遊一聲雲雁一襟秋只今楚客多愁思況是潘郎已白頭何處有山堪寄老此時無月亦登樓寸心或是孤雲起浩蕩天涯不可收相别相逢總是天朅來醉月又經年君歸已買三山馬我去仍求一水船貧富勿論俱是夢雨暘休問苦無田中秋已過重陽近頻向離筵醉拍肩舜㢸詩憂貧仍閔雨故詩中及此因以寛之人間八九不如意獨坐蕭蕭愁絶時空有此心誰領會知余明月是襟期婆娑寒影不知老呼吸清光能療飢今夕不妨休見面旱苗須雨一深犂送王公佩之瀘炎薫五月只須㬰底事書生亦渡瀘午影風涼槐繫馬曉岑雲白杖挑壺見聞幽谷鶯遷木氣類朝陽鳯集梧見説阿房曾有賦聲名速為詫東都送馮貫道赴行在二首路入丹霄起柂初峽山晴色曙煙疎海深南斗臨天闊江合西川直帝居禁漏深寒參佩玉御爐香暖散衣裾遙知三接承恩罷日影參差轉玉除又儒雅風流總不如烝髦久合下旌車黄堂報政瓜初及宣室傾賢席已虚楚樹迎船春去盡呉蓮傍槳雨收餘留連物色題詩裏健步傳呼有峻除雨中書事昨夜風吹茅葦紛今朝急雨洗崖痕山山霞沒江喧枕樹樹鳩鳴雲到門隱几真心開暝照繙書老膝痺危蹲山居染得疎慵病無復功名皓首論謝杜合州送酒浦樹江雲晩杜門史君書札問深村憂愁徹骨妨詩律賦詠開荒得酒樽病肺可能供痛飲濡唇亦足荷深恩呼兒擎出隨藤杖洗盞開嘗坐竹根眉僧曉岑僕未之識也持鉢求施既辭以貧則願丐一詩詩未暇作而三至門知嗜好可喜也因書長句四韻以贈門前剥啄遣兒譍客是平生不識僧檀施咄嗟貧未可詞場馳逐老猶能識凌風月收孤思乞與雲山伴曲肱我亦從來慙綺語休將此段擬傳燈和劉仲㢘新年春望二首年於鬢髮最相干又作新正一再看懶共燕泥烘午霽吟隨鶯樹澁朝寒餘生已分千人後燥吻猶須百榼乾愁絶向來飛舄伴蕭然形影若為歡又闢掠閒愁自不干因春成老亦看看花枝本自能時様燕子從前有歳寒酒著酡顔衰似健杖扶沙步雨猶乾杜門何似頻還往藉緑簪紅趂逐歡送張卿赴西路憲不容巴國戀深仁使節朝馳詔墨新山水兩川奇勝地典刑三晉老成人使星正自臨東井卿月元來照紫宸自是臯陶多邁種歸毘舜徳詠臣隣九日邀郭信可登龍鶴山已脱青衫付酒家請君含笑岸烏紗百年行見星星髮一醉須還歳歳花令甲許人休吏卒峯巒邀客上煙霞龍山故事依然在莫把風流讓孟嘉冬至有感蕭辰俛仰及嚴冬白髮空云是至公造雪不成天本恕喚梅未醒句無功可能人事無消長只待天時有變通節物相闗愁似醉一庭霜葉一忩風南至即事愛惜清秋預恐貧豈堪時序過來頻待梅沽酒無多日隔臘看春只並隣俗薄連墻成異縣時難佳節是蕭辰望雲還卜中興日濺淚乾坤一小臣梅花正是園林花木衰冰姿玉潔出疎籬月中瘦影道傍見江上寒香人不知時節驚心非故物簿書滿眼欠新詩碧雲暮合闗山逺擬折瓊英寄所思落梅不禁清瘦怯風霜逺信先憑驛使將樓上笛聲吹舊曲鑑中人面學新粧飄零院宇仍多思㸃綴簾櫳亦自香留與春風共流轉憑誰試與祝東皇􅙐醿萬仙同駕碧雲翔容與人間散異香梅似前賢長隔世酒真同氣莫相忘流鶯夢㫁驚風雨落月魂銷映雪霜春暖日長無一事飛花片片倚胡床和向文叔見寄煙雲浩蕩五湖身老向風塵學問津白髮只應無奈若青衫定是可憐人草侵吟枕依依夢花傍愁襟故故春江上負暄樵牧晩素書千里慰蕭辰縉雲寺借問禪林景若何半天樓殿冠嵯峨莫言暑氣此中少自是清風髙處多岌岌九峯晴有霧瀰瀰一水逺無波我來遊覽便歸去不必吟成證道歌謝陳舜㢸送丹茘驪珠三百照傾箱一一都全味色香道逺鶴觴齊騎驛雨多龍伯䕶津梁蠲煩已笑冰無味過眼仍同玉有光報貺無他空覔句更慙詩骨謝凌霜寓棲隱僧舍讀書茅竹無錢結翠霞歸來棲止梵王家夜忩聴雨翻書葉曉研凌霜注井花已隔朱樓安管鑰獨尋碧磵問津涯蘆簾紙帳門如水兀坐蒲團事不賖過鐵山驛來時趂作世情遊歸去凄涼遣客愁萬事世間多反復一生此地㡬春秋天寒樹老葉全脱水落岸髙溪不流行路﨑嶇縱難料江湖付與一孤舟清富軒道髙清識自超殊白璧黄金視若無坐側擁書皆是寳望中森木盡為奴朱簾畫棟皆成俗緑水青山可與娱日有輕肥尋訪去毎敎留戀過殘鋪題蔡雲叟山居茅屋依雲晩未收一門山色倚寒流戲簷黄雀驚彈劍飲水烏猿看放鈎醉卧落霞斜枕手髙吟晩日更昻頭朝廷莫問安邊䇿人在深山笑五侯送常徳翁知縣山多豺虎水蛟黿萬里歸來只舊官莫問蒼生待君起須知白髮見親難髙蹤已逐飛鴻去凡眼休將退鷁看得句驚人須寄我時時要看老波瀾寒食夜坐雨餘虚廡静前墀坐到空江月上時馬嚼青芻喧夜寂人圍緑幕夢歸期一年已是逢寒食千里誰能慰客思留宿春城愁落寞杏花明日更離披將之瀘南㡬年落魄劍南州重入蠻鄉覔舊遊十驛出城難夙駕一生浪跡愧虚舟家留異縣懐親老夢遶滄洲恐鬢秋白馬鳴寒如可問此身端復謝沈浮村居飛蛾故故撲燈光風雨蕭蕭打紙忩人為官方搔白首虎來村落渡清江猿啼冷日誰家夢故國愁牽㡬曲腸籬菊何曾憂戰伐夜添寒蘂趂重陽送同年朱元直監稅會計牛羊道益光幽蘭不佩亦芳香前郎未必辭官小我輩惟知作法涼客抱只消潘鬢白俸嚢無奈朔身長要知别後相思地獨上西山下夕陽又秋風可擬借年光曉覺新篘潑鼻香黄菊丹萸元嫵媚敗荷衰栁自凄涼山纔入眼身尤健事不闗心日便長欲把酒藤凌翠嶠醉餘起舞送重陽又池上千巖入曉光無花草木自吹香眼隨天霽山山見心與秋清事事涼長嘯響驚龍壑静微吟思入雁雲長未須搖落增悲慨新報王師復洛陽謝韓秀才送松栽四首新拓藤蘿住翠巒移根千本到雲端初乘雨露迎春種便作雲霄蔽日看巖穴從今增氣象茯苓可擬救衰殘知君有意憐棲隱更約堅身待歳寒又鬱葱待得覆巖巒愛䕶闗心豈一端已恐旱乾支水遶更防牛馬倩人看何當倚杖聴蕭瑟便欲從渠號懶殘物色最宜清浄觀列仙癯瘦不言寒又已將疎懶寄雲巒人世于今有萬端整頓林泉宜急急上還簪綬亦看看移根逺帶前山澗荷鍤行衝小雨殘急爾成林十年後颼颼為作暑天寒又飱松食栢老巖巒藥餌從今可問端髮白顔蒼無復懼骨青髓緑後來看色隨春焙茶煙碧涼入晨烹竈火殘自是本來山澤相故煩天遣伴淒寒代簡寄璧山諸友慈洞硯聞道諸郎長似林臨池已遣學山隂信傳鴻翼兼雙硯物比鵝毛表寸心書札總無縁孏病襟懐堪寄有孤吟歸裝準擬隨春色歳酒須留待細斟春久不雨老將百指寄耕田雨不霑春重慨然雲染夕曛成返照霧隨山色化輕煙王官掃廩徵豐歳野史濡毫記有年咄爾虬龍須早起莫將乖懶滯重淵春和譚曦晉仲見惠之什晉仲䕫人隱居歸之城下簞食瓢飲有可樂者大隱休誇渾俗塵由來空谷有幽人只無憂患催埀白何必功名掛汗青我已退非金馬客君宜上應少微星卜隣有意誅茅切竹杖交頭到夢屏和史濟川見贈歳晚扁舟雪霰邊蕭疎與君俱可憐向來共厄黄楊閏别後相逢白髮年覔句剰煩梅作興攻愁直縱酒稱賢故人一笑誠希闊得失休論布幔天縉雲文集巻二欽定四庫全書縉雲文集巻三宋馮時行撰七言近體和李堯俞郎中西歸有感去留出處勿相闗煉得心丹已九還自有文章為鼔吹只將廊廟等雲山百年有酒堪留念萬事無心忘駐顔郎署分符舊名姓安知不在覆盂間和李堯俞韻海頭歸到峽江濱新歲殘年只並隣梅自多情工惱客月如知已輒親人江山縱肯容吾老猿鶴應嫌不自珍從此扁舟須駕閣名教魯史續書麟雪中用黄太史韻密雪誰人巧擬鹽初飛仍帯雨亷纎夜吹玉笛滿浮酒曉看遥山高捲簾方積銀盃飜過馬欲銷冰筯插疎簷不堪時傍潘安鬢華髮朝來覺驟添題瀘南石􆀹灘雲間依約起樓臺江上遥觀眼豁開初謂僧房有鐘磬那知人户半蒿萊一生夢幻本如此過眼浮雲安在哉獨倚斜陽弔今古亂鵶飛處一舟回有感俛首趨時獨自嫌年來壯膽尚相淹神鋒不及錐頭利花蜜飜虧蔗尾甜萬里水雲閒有約一床墳籍靜無厭明珠自得非他得懶更驪腮著手拈登西樓二首林際虹霓掛晩晴西樓無事翠烟横荷花半落水風逺桂子欲飄山月明黄巻久忘塵世事白雲猶動故園情無端最是城頭角頻作凄凉塞上聲又年來雙目厭紛華獨上西樓日欲斜幽鳥有情啼苦竹畫船無事艤荷花呉天半出雲中樹越嶺初横雨後霞惆悵倚欄人去後一竿明月屬漁家謝馮貫道惠小舟先生憐我欲歸休為我添錢買小舟老去尚餘州縣業見來便起江湖秋有名如合稱聱叟無夢焉能賣直鈎他日相隨鷗鳥外短篷烟雨醉幪頭到墊江先作詩寄郝令君䝉老盛家山前古雀籬寒烟冷雨别君時後來空作相逢夢此處端成一笑期已聽歌謡增喜樂未聞謦咳秖飛馳急須倒屣迎徐孺一榻高懸更為誰和楊良卿韻新自興元歸見貽二首飽聽玉帳報平安猿鶴闗心又乞閒再理十年君杖屨來分一半我雲山歌能著意傾愁斛酒解將紅染病顔老去世情銷未盡尚希東閣管窺斑又人間平地有危機歸去應先未辱時少著青衫元自懶老簪華髮更何疑向曽汩没痕猶在尚此亷纎愧自知惟有冥鴻心一寸從今寤寐考槃詩登岳陽樓湖面層收雨露開浪聲千里急奔雷草迎雲夣秋光去㠶帯衡陽曉色來帝子不歸林葉下楚魂堪弔暮鴻哀羈逰到此偏增感况悼長沙放逐才送何子應二首送客江頭水漸生客愁無那亦相纓一離䕫子眞成别欲過岑公且勿行小舞清歌元有興緑楊青草正闗情背人歸去春無賴未害開懐鬭酒兵功名本自屬諸生誰向滄浪便濯纓枕上日高惟我孏船頭風飽看君行眼前歴歴幾經手意外悠悠久繫情待得封侯應有日胸中况貯萬竒兵謝益仲惠黄鷄苦笋新茶三物書意勤渠欲索鄙製仍首讃僕之談詠頗窺𤣥窟以詩謝之明月山中謝惠連逺將何物餉柴門仙歸碧落鷄遺種龍入丹淵竹有孫欲索風騷供詠味仍分雪乳滌䝉昏慇懃雅意知何報待把禪宗與細論送同年楊元直持憲節湖南二首天闊風高斾纛輕江清沙白映揚舲西岷峻極開文紀南斗昭埀並使星已見帆頭湖水白猶看柂尾蜀山青祇應直上裁天詔楚甸風烟暫一經又猶記瓊林插賜花雲霄翮斷進塗賖形歸靜定幾生栁道叩虛無類煑沙曉落秋風驚白髮病瞻南極記丹砂願分九鼎刀圭力留得殘年老種𤓰答杜如箎迃疎百試百無長身世從教墮𣺌茫老得雲山真不惡拙慿草樹更深藏三盃且共逢迎酒一瓣誰薫知見香便肯經年繫舟檝如君惠好實難忘見張魏公二首危機易蹈退難安進退如公地最寛憂國憂家雙鬢白通天通地一心丹乆虛海宇蒼生望專結庭幃綵綬歡終始哀榮情罔極誰云忠孝兩全難又四海于今望治安當頭退避也應難是非歴歴開新聽變化紛紛入静觀孰把後圖歌寤枕再將前事倚危欄重拈今古看竒特幸記塵冠久不彈宿石洞峽五十七年來往處扁舟幾繫亂雲邊江山寂寂渾無恙鬢髮絲絲也可憐水背黄牛吞七澤杯飜白鶴過羣仙差池世故渾如此底事長歌亦浩然送王子善移江津酒官一首相看相别意何如見事蠭生正要渠挽袖一盃山月上凝眸十里峽風徐衣冠苗裔烟塵際京洛風流咳唾餘自此清愁欺老得逢君重見為驅除二月將半雨過花盛開二首一年青春日無幾二月小雨花齊開底事我禁愁思得可能不近酒盃來山青樹樹明於纈江逺村村爛作堆老罷興來須抖擻自吟詩句自相催又最憐半見或不見更惜欲開猶未開樹逺秖疑隨水去枝低還似傍人來不堪小蘂罇前落可忍殘紅砌下堆著盡工夫春自去不須風雨惡相催鄂州南樓其下為黄鶴樓故基今日南樓獨上時西風無復片雲飛天連江水去不盡雲傍逺山閒自歸鸚鵡巧言終掇禍麒麟高舉亦知幾詩翁僊子今何在徙倚欄干送落暉郭信可索雲溪詩懶未能作戲成此寄以自解疎疎翠竹浄江沙逺寄新詩特地誇月徑剰教添鬢雪雲溪日放長苔花也知一決君無勇豈是狂吟我欲賖琴鶴今朝隨小隠詩篇明日寄烟霞題村居荆棘叢中少避鋒歸來袖手十春冬茅簷去市逺更逺樵路入山重復重雲與好閒長作伴虎知聞道亦相容濁醪寄釀枯松腹夜醉南山最上峯遊白鶴山草樹烟雲滿眼秋長河横嶺共悠悠覔歸未得登臨怯與世相違俯仰愁萬里音書無過鴈百年心事倚危樓西風早晩催征馭却向青衣江上逰日望冉雄飛之來乆不聞近耗因成鄙句以見翹然之思緩轡微吟自不催看山下馬想徘徊陽春白雪久不聽日暮碧雲殊未來已戒兒童篘熟酒更勤風雪化新梅雲間飛舄何時下抑鬱孤懐遲一開和蔡伯世韻二首鉅璞希音未易知芒鞋竹杖祇相宜還收北伐六竒計歸作東逰五勝詩千里雲山通夢想十年笑語隔心期擬憑浩蕩長江水日落烟寒寄所思又中郎風調世間無敢謂明時徳不孤掃地焚香詩得計曲肱飲水道如愚寄書只説游山好臨老都縁學佛癯白帝一來真漫浪時人無用便題輿題毛祖房屋壁卜築縉雲山下村縉雲山色青滿門承當春色花成段領略朋簪酒滿罇盡去機闗馴虎豹略推愷悌赦鷄豚要知餘慶須彌逺堂上森然見子孫牟元禮挽章淚注瓊瑰事可傷白衣回首白雲鄉兩三遺冊新詩在四十餘年素業荒學海驟乾千頃浪儒林舊剪一枝芳風流未寄三題草光焰誰家萬丈長不作人間金榜客應為天上玉樓章詼諧未見車公口錦繡應無李白腸幽鳥空啼踈竹徑青燈愁見舊梧堂就中有事空堪恨誰問雙親兩鬢霜啓韓安撫起復果州右某啓伏承某官已榮赴新任者以一郡而處公理無足賀以大臣而得郡例非久留爰開進用之端雅副登崇之望此古今之常者將朝夕而見之伏惟慶慰恭惟某官卓識宏材深仁厚德鬱爾希蹤於前哲憤然有意於蒼生爰自拔於英躔已茂隆於偉望薦登省署懐獻替以斯陳載駕星軺志澄清而愈厲屬分閫㦸坐鎮方維當四海横流之初有三山屹峙之勢輸誠許國心或喜於似人觀過知仁事久伸於清議顧幽明則可質而無愧其是非果不辯而自明况當受百枉而冀一真豈可以一眚而掩大德曽未温於坐席諒以促於行裝某飄泊踈蹤陶鎔舊物久絶攀躋之便濩落無成竚聞感㑹之期激昻自奮望門䦨而稍邈懷履舄以增勞方大渙之在辰兾節宣之無爽傾祈正切敷叙奚殫代謝薦章右某啓伏以坐靡餼廩茍克潤於龜腸仰累鑑裁幸標題於麟角寵斯踰分譽實過情伏念賦性凡庸受材么麽麤聞詩禮偶與賓興雖由玉牒以傳家竊慕布衣而為業良塗蹭蹬秋風六鷁之退飛猿跡羈危夜樹連鷄之不宿幸遭天眷寵賚宗盟旋被命於行朝遂簉名於仕路雖襃衣博帯已愧初心之非而簞食豆羮良賙此日之急未辭捶楚况荷帡幪已察其無補於㳙塵盖未嘗過索其瑕釁深戴涵容之德敢希收録之恩特被薦論夫何幸㑹此盖伏遇某官襟期恢廓局量淵宏冠冕縉紳羽儀朝列黄堂弭節政行蜀道之三千紫詔遄歸詩繼盛山之十二雖小善而加録無大故則不遺必欲門下所收略盡海内之士致茲纎芥上辱甄收某敢不益勵操修以酬知遇棲遲得地茍安鷦鷯之一枝奮迅有階願附麒麟而千里回諸士人發解職叨勸駕慙微禮之未伸德務撝謙荷長牋之先貺氣凌飛鶚技擅雕龍竊觀翰墨之間已識雲霄之志第褒稱之過實懷愧赧以尤深舜世八元覿烝髦之盛舉虞韶九奏聆覽德之希音欽佩以還敷宣罔既鄰郡武臣啓清時竊禄懼濫吹以瘝官盛德為鄰幸餘波之及我屬休徒御始見吏民悵職守之羈縻阻門䦨之躋陟恨無飛翼徒切傾心恭惟某官天禀英姿家傳妙略毎應弦而落鴈旋下馬而賦詩惟山徼之崇城實坤維之後戸茂膺綸誥剖符竹以分憂光奉詔條總中外而共理剛柔並用畏愛兼收塞草甚豐藩牧望風而逺引邊烽不警農民悉力以深耕諒騰最於楓宸即召還於天衛爰發謀猷之壯共成恢復之圖某潦倒無成迃愚有素動為模楷毎寤寐於高標輒露悃誠載馳驅於素牘傾祈之切敷叙奚殫䕫帥冬節周正在候蓋隂極陽生之朝君子乗時有小徃大來之象神明所贊福禄惟新伏惟歡慶恭惟某官英傑自天精忠許國望實兼隆於朝野猷為雅見於事功政若龔黄定亂無聞於逺略勲如李郭治民不載於嘉稱挈二柄以能兼在今日而為盛慶毎由於善積福亦自於已求是宜戩穀之辰倍介繁禧之祐某雖貽罪戾益荷恩憐身繫簡書心馳門仭想稱觴之簪履阻綴末塵採擊壤之歌謡輒形善頌欣抃之至敷叙奚殫郭帥總戎秦徼易鎮䕫闗廟筭無遺賴前籌而借筯天顔在望從三峽以首塗此心與蜀江而俱東偉望比巴邱而益重恭惟某官英姿拔萃傑氣超羣雅耽悦於詩書旁貫通乎韜略騏驥千里世莫追於絶塵鵰鶚九霄物無比其勁翮感風雲而有㑹勒彛鼎之可期方世承平已將使㫖屬時多難薦握兵符當中原失律之初正敵勢方張之日哥舒宿將已失利於潼闗諸葛全謀亦旋師於渭水天險不固人心匪寧爰假節鉞之雄式正藩維之重偃旗息鼔增重於巴蜀之門雅歌投壺震讋乎商洛之表以至國家推誠心而待敵鄰封挾狡計以乗人請和而盟盂未乾棄好而邊烽已警偃甲兵而載戢廓關戍以盡開巻地長江苻堅妄意於投箠接天峻坂鄧艾徑行而裹氊彼有萬全我無一得於是奮精忠而戮力致果毅以摧鋒雖未殱其渠魁幸不失於舊物綿井絡之奥壤作東南之巨藩賴公力以居多載輿言而甚著况乃曾經品録官爵盡已公侯今立功名輩行皆其子弟欲推擇於先進罔踰越於元勲行覲紫宸屈指而期告語暫留白帝束裝以待召音雖欲卧鈴閣以頥神登郡樓而嘯月時有不可理所當然必使彼人知吾父之果在豈容遐俗願我公之不歸某濩落無材激昻有志婆娑一壘坎􅇄半生質言行於鬼神寄胸懐於風月當負弩前驅之道敢後拜迎簉彈鋏長歌之賔儻䝉與進尚阻修於川陸已夢想於門䦨方比秋冬之交適當雨潦之作麾幢拂潤攜家想倦於降登鼓角凝寒憂國諒增於感慨切希珍䕶以保粹和師帥列薦右某啓伏承三司照牒列薦考察擢用清要不次任使者小壘素飡深虞譴戾諸臺過聽反被薦揚合衆論以為公捨餘人而見録濯塵垢以江河之潤上姓名於雲漢之間顧儔輩以厚顔感恩知而刻骨伏念某迂愚禀質闊略居懐麄業縑緗濫塵簪紱自冒收於末第逮竊剖於左符閲世故以居多守初心而若一視聽言動凡事揆以幽明進退升沈一切付之造化是特操修之末節殊非經濟之大猷施於已以寡尤及乎人而奚補矧時屯之正劇亦民瘼之未瘳方力濟於誅求豈暇論於撫字毎見循良於簡冊滿腹生慙欲逃曠散於丘園頻年有夢敢自忘其平素或妄起於覬覦輕以積釁之身輒冒踰涯之寵豈謂某官遏惡揚善藏疾匿瑕謂舉一而反三固徃聖擇人之道然拔十而得五亦前賢恕物之方惟務兼收益期富有雖至精至明之藻鑑難罔纎㣲而可上可下之品流亦埀聽採某敢不以賢聖為法非仁義不行遽辱褒嘉不敢為榮以為懼已經題品寧忍自棄惟自新庶有可稱於焉圖報運使伏以師踰一紀已深懸罄之憂日費千金益仰轉輸之給惟茲柄任允屬通才諒推忠信慈惠之心以濟急迫煩苛之務俾軍民而兼濟書竹帛以無慙於時則助成必勝之勲在已而邁種無窮之德啓行伊邇渙命惟新伏惟歡慶恭惟某官秉德粹温受材疏亮事必造次於仁義心惟軌轍於聖賢不剛不柔茂布循良之政知予知取共推經濟之才果注簡求爰司計度方兵連而禍結屬師老而財殫信饋給以惟艱矧追胥而既竭然師旅饑饉仲由且使知方乏絶敗亡蕭何輒能補缺雖事為之不易而處畫之必優衆務集於投鞭萬里知於指掌行見殄殱之日髙論指縱之功某齷齪非通支離益瘁分竹符而有忝象木偶以無施奉粟一囊已積憂於尸素澄波萬頃行丐潤以棲遲方霖潦之頻愆亦川塗之迴阻攬轡實勤於徒御衛生尚䕶於鼎茵新憲大卿竊以遐方瘠地之民久需惠澤觀風問俗之使茲屬老成宸命初頒輿情胥抃恭惟某官術業淵奥宇量澄深夙較藝以無雙爰飛聲於有截依流平進班禁從以何賖體道無營滯列卿而不憾屬踐更之既久養譽處以彌高國藉壯猷時傾宿望竚登崇於散外薦承弼於樞機攬六轡以西來曷云展驥跨三峽而南下姑使首塗行踐嚴凝亟攄藴積如某者繆㕘冠屨稍業簡編四十無聞尚何能於振迅萬一可冀庻或被於甄收方將俟命駕於星躔寄萋苴於雲䕃勉收濩落仰奉規繩作吏于茲藹風聲而在望登仙伊邇耀寵渥以方瞻霜露在辰旌麾于邁願勤葆攝庶却寒嚴張尚書除四川制置伏以某官輟從常伯寄以藩宣奉九重綸綍之言兼四道黜陟之柄條章已布風望凛然竊以軍旅薦興賦斂尤劇姦吏並縁而漁賦良民憤鬱而無告時俗既弊名實轉訛風憲之司不以鷹揚督察為任職而以漫漶黯暗稱長者敗羣不去畜自難蕃害稼不除歲寧有獲抑又聞聖人有變通之道自古無不弊之法寛猛相濟政之大經二柄或偏未嘗無弊本朝崇寛厚慈仁之德逺追唐虞三代之風埀二百年至于今日雖恩澤慈愛實固結於心而簡慢茍偷亦寖淫成俗欲臻至理豈得循常雖申韓峭刻之方誠非聖時之所尚而管晏責實之政或於弊世而可行昔虞舜之繼堯也一朝而去四凶孔氏之在魯也七日而誅正卯盖弛慢之初欲速成於政理雖聖哲之治難獨聽其自然道有經常循環一揆伏惟某官以孔孟為法非堯舜不陳維持大中協贊皇極德大業鉅鬱為名臣惟蜀國之西門實下蔽夫吳越屹為巨屛獨倚長才望已隆於萬夫名則重於九鼎至於革太寛之弊開赴愬之門槩以大公期於必罰或去或取若衡鑑之無心一笑一嚬備春秋之生殺所以昭蘓疲瘵封殖本根仰寛四顧之憂益養具瞻之望某嘗見古人麤知道理凡可愧可怍欲人之不為而取人與人豈已之敢犯當罄乃心而夙夜率其俗以周旋惠此千里之民使如治安之日庻幾上無負於明天子下無負於賢方伯幽無負於鬼神明無負於民庶冒陳悃款稽閲歳時惟儹率之是虞久趦趄而不進跡誠簡慢心則匪佗伏積兢惶尚祈開恕知縣恭惟某官持身近厚學道愛人剸制劇煩茂著勤勞之績撫摩彫瘵居多豈弟之風惟衰朽以何為倚強明而有助貽牋彩絢誠踰贈衮之光治報荒踈深積負芒之愧方征徒之始戒即瞻奉以非遥暄煦在辰均調是祝答新任通判被命造朝自為廢退䝉恩假守尚爾叨塵宜已棄於士夫猶見收於朋好華緘寵錫縟禮優存拜賜若驚銘心知感恭惟某官芝蘭竟體琬琰為心文刋不朽之傳理造難言之奥蚤先登於衆俊茂振聲華益無愧於古人深藏器業屈鳯閣鸞臺之選從銅章墨綬之卑澹然不見於色詞顒若有孚於愷悌行見鋒車之峻召豈惟别乗之微遷郡國父老則嘆其未來而朝廷衣冠已望其將至竚聞告語連副精祈某蹭蹬餘生頑踈朽質雅䝉比數置在交游之間或未鶱騰暫獲從容之益傾馳之素敷叙奚殫復郭愛義知郡壠畆躬耕方擇飯牛之草置郵傳命忽叨如斗之城重以鞅煩怵迫之勞輕易逍遥遊燕之樂實回皇於志慮莫取決於行藏盖覆轍在前義何堪於再辱枯株將朽理難望於更榮已具悃誠仰伸啓問適長鬚之未遣而盛价之俯臨燦然絹婦之詞過形黼藻惕若韋弦之戒深中膏肓詞翰之間憂愛備至此盖伏遇某官先事而慮視已若人憐其困躓羈窮之蹤微有煦濡霑溉之潤喜形顔色思動淵𠂻既極筆以褒稱又㣲文於剪拂風俗久弊直諒無聞徒䛕悦以取容豈切磋而為益欽承至誨良謂希音至於暮年出處之宜誠是此生榮辱之㑹益煩參酌俯迪愚㝠方溽暑之佳辰祈至和之是保䕫路蔣提刑望夫子之宫墻閲時既久識荆州之面目指日可期於浮泝之始休已齋薫而欲進披瞻伊邇欣幸實多恭惟某官禀德粹和受才魁傑學臻聖賢之藴文擅古今之雄早躡巍科韋布霑其膏馥薦登膴仕衣冠賴以儀刑漕輓餘閒訪遺蹤於羊叔子平反暇豫追英槩於諸葛公毎於從容談笑之間能致寛裕直良之政神壤方懷於聖化凶魁已殄於天誅急須宏逺之謀用濟廓清之舉即聞芝檢促覲楓宸非一人之私實衆望所屬欲通悃愫深積兢惶方還里閈之初便切門䦨之想欲投姓名於記府敢貢柔牋冀修桑梓於賓階終䝉異盼荒踈有靦冒瀆為虞虞宣諭被命中宸宣幾外服舉江淮已試之驗圖川陜克復之功竊觀未至之先聲已見必成之後效士論胥慶軍勢益張凡託庇休舉增抃蹈恭惟某官高明忠恕博大純深機權酬酢於無方德行素儀於當世覃思奥學追符近代之賢茂著英聲上徹九重之聽薦迴翔於省户爰演飾於綸言立朝則和而不流遇事則仁必有勇迎刃自解謂世無難成之功抵龜决行恃已有必勝之道氣吞異類義動三軍督貔虎以振天威誅鯨鯢以雪國耻蓋識投機之㑹立收唾手之勲中外由是知威天地為之巻祲膚公既奏眷意彌隆委山甫將明之才授鄧禹征討之略江之南江之北共高一戰之竒勲陜以東陜以西獨兼二公之重任况茲八座之選實兼兩府之階委任已專進拜斯在日百里以闢國歸司空輿地之圖月三捷而告功正冢宰代天之任佇聆歸覲式副具瞻某年迫衰頽日䝉收召既昧適時之見難干造物之私嘗進狂瞽之言愧乏涓埃之補自知無用誓決退休或推之或挽之恩則甚厚其進也其止也耄矣何為寵尚冒於承宣恩實慙於大度茲聞休命尚逺賔筵陪班謁以未遑第向風而欣抃除西路憲謝五府伏以素學闊迂毎慙及物壯懷衰謝已分歸田既竊分於郡符復就將於使指爰念生成之賜曷勝銜戴之情伏念某一介單微半生流落志雖勤而事弗偶譽未至而毁已隨時正逢於清明年已薄於遲暮退守固陋欲自放於散閒時激精衷實未息於感憤曩膺召㫖即覲明庭初為萬里之行實幸一言之寤適有負薪之疾伏枕為虞不遑擇木而安投林甚急亟上掛冠之請徑為擊壤之游羞既去而復留若以退而為進素絲良馬反玷專城之恩華節繡衣更叨將命之寵非據而受何德以堪此盖伏遇某官鼎道吉亨坤元静順道大而取不竭才全而應無方屹當安危之機中立不倚黙觀成敗之數外侮自銷推稷契之忠嘉成唐虞之揖遜始終一德協輔兩朝以嘘枯吹生之權行拔茅連茹之志無一介之或失兼孤蹤而不遺某雖窮途之可憐顧初心而猶在奉三尺以從事誠無取於皂衣明大義以決疑益深稽於黄巻庶收微效仰報洪恩過此以還未知所措回彭州屬吏右某啓伏以濫被召音屬纒疴而不進猶叨郡寄懼投老以難勝幸聯事之得人庶瘝官之可免恭惟某官才姿敏茂蓄藴粹深以禔身之緒餘為居官之事業翺翔州郡盖戢翼以待時騰踏雲霄信摶風之有日守恭謙而為德賁衰朽以摛詞覺錦繡之非華況寶玉而為重願言瞻覿束書劔以徂征款奉從容就賔寮而獲益及家倥偬治報荒踈答田廷傑秀才帖某啓辱專介惠教并新茗凉扇感悚之餘從審動止萬福以慰以慰某䝉不鄙埀問顧衰頽何以補於末議然所惠論唐史所謂三代之治出於一者非一是一箇物老氏一生二天得一以清則一是一如唐書所謂則止言三代之治上下君臣同用禮樂一般非上用禮樂下却别用一般故曰三代之治出於一而禮樂達乎天下君用禮樂臣用禮樂士庶人亦用禮樂是治出於禮樂一般别不出他術非如道生一之一天得一之一左右却用作老氏之一大不貼題意也僣易莊周一與天為徒不分别是非彼我混然純全之謂一若有分别心是人也故一與天為徒不與人為徒其一也一是天然純全者原一也其不一也一是非彼我美惡去來一切俱泯則不一也亦一矣如是則混混沌沌復乎太初豈非真人哉荀子以艱澁之詞文其淺易之説精於道自然兼物物物物云者為物農賈之徒是也以物物自物故曰以物物精於道者兼得以物之人故曰兼物物何不似孟子直截説勞心者治人勞力者治於人邪本是淺事特作難曉之文不足道也今年白宋瑞予憂受徒不肖盡却諸生令從宋瑞老夫一年精力衰如一年從今只是省事取閒散雖自已學問亦令荒唐况授人乎惟左右望深諒之某悚息辱誨審杖履清勝侍奉萬福某荷芘如所見時不足念如長者才業自已精練當側耳聽髙擢也宰君好事已詳於左右達之矣性便是天道天道便是性古人所以知天者知性則知天矣如何性固分明天未暴白邪益望加思天寒珍䕶某悚息辱誨并長牋所著五論荷意勤至何以當此某災患餘生年事向晩心志消落不足以為人師略有所見頗難渉話言若陳之於文詞則意愈秘晦不可曉解若之何施之於科舉得失之間科舉之業舊雖由是以進及今已三十年荒唐不記縱復舊性習未泯自與時背若之何較之於一時俊㳺之前反復求索思有一副所以命我者而不得用是不敢承命切希容照長牋條貫疏明能自明已意五論皆濬潔有統紀持此以合有司有餘矣雖見老朽固何以加毫髮於其中勉自師心以遲光大奉狀復將命者不謹霜寒為術業加愛某悚息去歲合陽幸獲披奉别來滿有傾系忽辱惠教雙緘長牋文義焕發驚晤老眼深用銜戴但平生故人乃以此禮見遺似非真情質素者拜賜惶懼欲復盛意窮居無人緘題又賔客滿門頗勞應接有所不暇惟髙明謙光多所容恕必不以此為譴故草草為報不自以為不可幸亮照雨甚久蒸濕如三伏無髙秋清凄之氣伏惟燕居清裕動止萬福欣慰欣慰某碌碌如常叨冒得守蓬池見説弊敗不可振作謾須一到圖去就耳未涯披奉敢祈為逺業崇愛縉雲文集巻三
