body:
  text: 縉雲文集别集類三宋提要臣等謹案縉雲文集四巻宋馮時行撰時行字當可壁山人紹興乙卯丙辰間為丹稜令罷歸後出守蓬黎州終於提㸃成都刑獄公事嘗居縣北縉雲山授徒因以為號宋志載其文集四十三巻嵗乆㪚佚明嘉靖中重慶推官李璽始訪得舊抄殘本編為四巻授梓此本即從璽刻傳寫者也時行宋史無傳四川通志稱其與曽開朱松等共斥和議忤秦檜坐貶今讀其詩文忠義之氣隠然可見志所載當不誣惟志以為嘉熈間狀元及第考集中明云宣和初應進士舉又有建炎庚戌中秋與同官相期月下詩及紹興六年十月六日詩斷不得為嘉熈間人宋狀元録亦無其名志殆流傳之誤也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3cc709ad07d322eaff653f57fd2e4794cc642dccd0813b6074498d832039e1f9
