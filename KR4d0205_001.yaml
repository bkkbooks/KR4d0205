body:
  text: 縉雲文集巻一宋馮時行撰五言古詩遊石龍偶成寺僧通首坐飽歴叢林歸老此山故詩多及之飛泉撼琳球羣山髙崔嵬中有古道塲紫煙籠觀臺石門不施闗榮辱自不來霜鐘鳴萬壑日出山霧開老僧挈筠籃上山拾羮材歸煮南澗水至味謝鹽梅食飽不下牀法身充九垓破衲一甲子雲閒與徘徊我欲吐情語銘之古巖隈雲切戒多事勿聽龍作媒為雨非不佳世間多塵埃預恐為雨罷歸來汚蒼苔友人惠酒殊佳用清光滑辣四字為韻以謝六府萃百感攻愁須酒兵故人如我知侵月走雙甖手裂絳泥封瓦盆貯瑤瓊我生百世後見此聖之清一飲肺腸潤再飲毛骨輕何必跨茅龍超然欲遐征先生飲至和尺宅如鑑光餘力暨酒醴百甕春朝陽洗我朱墨塵凌風龜鶴腸醉鄉更飽歴岐路久已荒休吏閉齋閣三盞通真梁到處百慮息其俗如陶唐苦懐茅屋底夜歸船軋軋酒榼對魚籃照路燃藁秸及門呼弟昆長少常七八酣腸如有神造化不管轄朅來久欠此君乃餉甘滑大醉今復狂醒來恐愁殺冠豸取能觸佩劍取能割飲酒移氣體我亦嗜清辣舉白欲下咽丹腑已通達温温坎離間正氣自旋斡於焉養真勇險語犯天闥千鍾建太平豈徒為消渴舍弟生子多女信無助多男復何虞我固喜二仲輩出三丈夫圓郎未解語手欲學抹朱閏郎好神氣兩眼澄秋湖復有新生兒初探𤣥海珠一一閲清俊並是千里駒胡為集我家足視種徳符昆弟若一體在爾猶在吾堂前有雙親各已皓鬢鬚抱弄想慰意顔色朝愉愉未問壯門户悦親良所須況我藜藿腸要當飽典謨足以立家學燦燦遺羣雛爾後更五稔汝等行不扶我欲為道肥汝當為書癯富貴何足道陸賈真洪儒龍鶴禱雨地靈丘壑䆳危路入紫煙藤蘿閟尺水中有龍潛淵青曦弄驕暉紹興丙辰年嗷嗷周餘民生理諒難全令尹謝不敏來上天公牋一念如絲芒已斡造化權夜半雷遶山雨出山之巔凌晨眺四郊草木亦欣然民戴神之休次謂令尹賢賢則吾豈敢庶逭失職愆甲兵久不洗風霾漲塵寰茲事非神助若為快濯湔物極理必反否泰如循環神龍儻有意速起飛九天斬鷄栖木舎南開小圃土平如沃肥去年種桃李今年花離離畦丁不解事其傍樹鷄栖雨潤枝柯繁風吹花葉披頗乘風雨力似欲桃李欺桃李不自持向人顏色低客從何方來指呼厲色辭謂我同薫蕕蒙昏其在茲草木區以别其猶異妍媸再拜謝客意黽勉事剪夷桃李佳氣浮欣欣如有知老夫意猶惡有悔不可追大哉天地寛含覆萬彚滋美惡詎可齊俱受一元施援毫書其事用貶小己私偶成越羅與蜀錦被體何其華豹胎與猩脣適口良自佳佳美未必得飽暖不可賖明通紙勝雪樂昌墨如鴉更招南浦石四友相寵加謾薰新寧香時烹固陵茶蕭然文字間亦足為生涯憶淵明二首晨策東籬路煌煌寒菊英我豈無他人底事憶淵明忘言會諸理掃盡世俗情悠然見南山此意誰與評五音不害道其如哇淫何聊以寫我心素琴時按摩澹泊有妙意豈憂焚天和賢哉等㝠鴻竟免嬰禍羅題涪陵楊彥廣薫風亭身世如浮雲百年一飄忽古人事業在已腐蒿里骨惜哉薫風亭勁翰儼突兀想當揮灑際浩氣漲溟渤迄兹變故後同好亦泯沒散帙落危睇作亭煥新揭超然盛徳後清芬念貽厥亦聞爽塏地山水皆秀發曠蕩敞遐眺葱蒨羅翠樾勝遊集簪履有酒備百罰異時太真園絳樹山硉矹吾其解煩鞅長風卧煙筏問津鷗鳥外亭上散白髮飄飄揖薰風解帶脚不韈咀嚼清冰圓内洗肝肺渴嗚呼蒼梧逺瑤琴久衰歇於焉慰永懐森森來披拂耿耿入踈襟更欲遲華月登洪雅明月樓與陳舜㢸楊養源任道夫孫彦和探山水有清音韻賦詩得有字秋風吹征衣我來亦何有長笑泉石間邂逅得良友飛屐凌長煙相與濯世垢浄宇閟寒藤傑閣架層阜登臨意象寛軒豁擬髙厚江山來拱揖似欲問安否岌岌環翠屛蜿蜿拖緑綬欣然為酬對舉此一杯酒憩心自瑩瑩領要語不莠浩歌激巖谷朗暢孤月口晴忩鏡萬類憂樂隨所偶向來事朱墨伏案蠒生肘鬱鬱成底事一腹負百醜及兹謝塵紱未及休五栁暫與真賞愜榮辱已芻狗況復老煙霞循寄日云久頗聞葛稚川芝术幻衰朽至今杖屨地歴歴傳白叟欲往從之遊静守一氣母丹成跨明月咫尺上南斗頓首排天闗丐天解禍紐日落寒雁哀雲歸暮山黝此意竟何如乾坤一搔首洪雅以葛稚川得名今洞後乃其棲隱之地隱甫聖可子儀同遊寶蓮分韻得郭字海縣一㕓市天地一郛郭跼蹐礙髙厚而況自羈絡末俗競芒忽訟紙霜葉落平心作巨帚一掃付清廓無事我所得超然解塵縛天浄鏡磨垢日炫眼刮膜野水照曳杖山煙薦飛屩清朋璠璵姿興寄相領畧世間出世間秋風古蘭若翠巘拂觚稜紫蘇濫闗鑰晨鐘隱町畽香霧散林薄竹密萬夫静樹迸蒼虯躍黏壁篆乾蝸簷絲下晴蠖蒲團便熟倚茗盌快自瀹性與香火冷身脱簿領虐理窟深探討迷津鋭疏鑿心期跨汗漫知音付丘壑俯仰三十秋痛被造化謔貧窮道味勝老大世故約妄念春朝冰不作間市瘧出據廊廟地入分禽鳥樂時來屈伸指胸次何綽綽一官弛負擔五斗代菑穫看山未害廉塵迹詎可削倦鳥争瞑樹短景轉修閣一來固未厭再至良不惡明日復命駕便道過龍鶴紙帳野人抄谿苔十幅圍秋風缺月窺我床皎皎一室空錦繡開華堂坐挾不賞功戮辱在其後居然是樊籠先生於此間微吟和寒蛩須㬰寢不夣覺來日升東布被天地一指耳笑付盃中春蒙頭布衾在得失更勿論前時曵竹杖步過桑麻村買費一千錢十年度寒温恭儉徳之基福謙有鬼神未能行於人敢不施諸身蒲團瘦骨何支離老鶴驚晴霜軟苧聨溪蒲一榻風月堂四序自鱗次跏趺貫炎涼達官重錦茵妙姬羅衣裳寒士倚清秋憂居涕浪浪此君勿相留我欲坐相忘瓦爐六籍聖賢心歸來還下帷老瓦燒栢子冉冉度遊絲侏儒飽欲死靈均自長飢塵言汚人耳夜來洗漣漪更欲清鼻觀引手時一披知我其惟天不須對愚溪竹枕無節青琅玕葛陂化龍餘可以奉君子不憚捐其軀幽人飽藜莧總以飫膏腴食罷掩闗卧鼻息谿雲敷斗升乞西江碌碌愧非夫五友平生歡相從歸故廬見雪前日揮輕扇今日御重衣重衣御則已仍驚朝雪飛數峯起天末練練生光輝有如老大臣正色立玉墀風自山椒來凜凜折我髭馬上久駐目感此良慘悽一昏復一曉冉冉歳月移憶昨大觀初我始埀髫兒倐忽一彈指面目生權竒今朝天上雪宛作山中姿豈免三十年侵我兩鬢埀況此甲馬動憂端宿肝脾何當撥百憂采采山中芝一洗稻粱氣攝身凌霏微春花與冬雪俯視造化為去去宜努力所幸今未衰張明逺自持其所居萃勝亭記來求詩為賦三篇其一静躁固異秉出處良一途巖前東來人飜然應時須赫赫帝者師去與赤松俱鐘鼎與林泉天以私吾儒窮達俛仰間取捨亦須㬰曲士胷臆窘屈伸自囚拘長往信已隘不休諒其愚倚天霜崖姿岱表張延符桂棟辛荑楣超然結雲廬花草粲綺羅清飈發笙竽岡巒為肺腑煙霞相友于逍遙以徜徉聊可與為娛伏櫪萬里心勿作山澤癯其二百城何岧嶤儲清自太初静境超人寰羣仙之所居清都閟寳籙宫闕函丹書真人拜玉庭天帝手自除寳蓋相參差縹緲來空虛我欲從之遊茲山遂慵踈朝霞以為食浮雲以為車此意靡堅決西望空欷嘘君今定不凢買山自菑畬上方切層霄伊蹊百歩餘瑤草破霧收青精凌雨鋤往往逢迎間松喬曳雲裾為我語羨門問訊今何如其三文章蓋代手千載栁栁州落筆記山水竒香撼琳球開巻一再讀宛若從之遊歴歴爽心目毛髮為颼颼若人嗜清曠步履素得幽攬勝得樞要天地不可搜巉巉華山孫藤蘿護維陬絶頂葺荷蓋風月共夷猶物色自飛動與我相答酬千里入睥睨逺眼縱莫收憑軒寫清絶文與境趣侔栁魂不可招君㡬紹前修何當棄圭組從君送清愁重陽登翠圍亭亭廢十年竹栢蓊然殊蔽逺眼命寺僧芟除剪伐屏翳豁開林巒杳靄殆丹山之絶勝處也與同遊分韻賦詩以老杜開林出逺山為韻得逺字林樾失洗沐叢灌老偃蹇坐令軒豁地雍穆成奥閫千年李峨眉孤調絶攀挽徑欲剗君山笑看湘水逺我來此亭上造化閲舒巻何堪浩蕩意鬱鬱仰若俛蘭蕙生當門尚爾付鍤畚大材廊廟具顧此何衮衮石角礪霜斧一斬三百本圖事欲大快不復計小損天地英氣歸川原勝魂返鏡開水灔灔龍轉山蜿蜿卧虹踏歸市融雲䕶春墾晴光蕩芳酌中筵舞蹲蹲黄花壓客帽胡床秋風穩萬象競參揖相見一何晚通塞有時運明晦理相反干戈天地閉撫事切深悃痛澆磈磊胷不復效老阮和鮮于晉伯游卧龍四十髮已白百謀無一成林泉有夙志芝术寄晚程人間好山水往往盡經行輒忌墮圭組所至欲有營卧龍勝蘭若曩游愜平生蒼茫紫翠間藤蘿路囘縈上方攀躋迥遐矚襟宇宏風䬃秋嶺瘦雲護曉泉明汲甘潄芳潤擷香佩華英境迷煙霞痼道豁人鬼盲是時駕言旋濡毫記前楹于今已八稔愧負猿鶴盟君今倚巖桂泠然賦晨征仙人餌白石幽士飯青精興託風塵表咏味見髙情欲往從之遊秋夢一羽輕静躁本異趣出處諒欲誠胸中一丘壑敢以易功名杖藜如可再君為寄先聲南嶽寛嘲笑北山緩譏評行亦老菟裘今姑隱市城此心隨雲歸與山日逢迎送開守解印窮冬自蕭疎小壘𤣥雲開使君擲虎符行矣何遽哉父老相與言未言心已哀自云好使君撫我如嬰孩天不為我旱人不為我災使君今已行力挽不可回舉手向父老聴我勿我猜赤驥萬里足瑤池倐往來伏櫪方丈間何其等駑駘丹鳯隘寥廓五湖看如盃修羽落樊籠安得一毰毸驥非伏櫪姿鳯當翔九垓使君稟天秀磊磊真長才峽裏三家村胡為久徘徊況與艱運偶中州漲烟埃天子急親賢搜訪盡草萊一麾諒其微千里良需材棄去自騰踏為國除禍胎父老休嗟惜功勲在雲臺寄魏相之烟塵漲中州大雅欲陵替遮眼惟甲兵開口無丁字君從何方來落落清廟器豈覔佳吏部惠然枉輪駟快語真起人坐久益宏肆復歸磨破瓦自寫錦囊秘敲門遣長鬚恍若明星墜意逺出寥廓沈謝堪叔季昔人重勲業文章乃餘事當其困湮淪慷慨動幽思舊筐儻好在萬代作清吹聽君發餘論堂堂藴經濟賈生求屬國居然不自試飄飄雲雨峽風沙正顦顇老耼柱下史莊周漆園吏鴻鵠千里心蹭蹬戢逺翅平生有筆硯艱難不相棄得失與憂樂付此一游戲舉手忽盈紙不知老將至達士要如此何必苦酸鼻凌江我二友大非俗士比與君共朝夕可以忘世味嗟我謀生拙汩汩耗元氣相逢思共載羈紲但長喟别後有新詩莫忘情所寄一瓢落清江頃刻荷清賜一飲一再讀一篇為一醉和何子應夜讀書軒頊握元氣堯舜法令疎三王備文物古意漸欲無周平一東轍列國異車書祖龍失雲雨大漢天為謨後更十數姓年歴㡬千餘滄海屢清淺興亡如合符生平笑書簏逺覧資良圖滑浄一棐几萬代忽森如佳處仍三復此意良不虛豈無太乙來青藜夜相呼挈我遊太初天地如蝸廬以思不如學聖言豈欺予江行書事扁舟如竹葉塊坐筋脉緩起尋笻竹杖散歩午沙暖石浄困還坐江緑汚仍盥山轉孤渚沒岸落細路斷草色暝煙霧花樹見村畔物象總相愜欲遣詩句管詩成自吟哦兩袖春風滿皛皛日欲暮我行亦已嬾聊復喚踈篷疊骨作小款范蠡定何人得遂老蕭散我待功成後此語正恐誕徑欲具蓑笠煙雨隨蠻蜑建炎庚戌中秋夜與同官相期於月下既為具頑雲障空不可人意作詩以紀之得賞見二字散懐誰與儔風月茲吾賞好景會人心宿約毎不爽蓐收濺明河玉露洗穹壤肅肅夜氣寂皎皎素沆漭飛出未半弓已照天地廣茲夕豈易得久矣俟清賞雲師誰爾忤屏翳蔽虛敞萬事不可必變化如反掌太清一滓穢幽娥動懸想誰為披層霄快哉心技癢聞君洗瓦盞倒榼有餘盎何當數列炬酣歌散清響有月固來游無月須一往玉皇勅諸天茲夕盡羣見驅雲收月光反照玉京宴老龍飜海窟杳靄鬱萬變天公有嚴令遺隙無一線蕭蕭寒桂影可想不可見生平謝惠連與月有深眷對影無清暉把盞不下嚥亦聞顧兎藥天成非九轉可使騎清風飛入廣寒殿安得一刀圭扶我超宇縣稽首分帝觴飽以瓊爢薦回首鄰清娥相將以遊衍人間滴與瀝役役自卑賤贈故人二首一日如三秋屬君情所専晨風吹初春繞屋鵲聲乾得非造物意憐我徒侣單放晴速君歸一笑不作難起攜化龍竹消散枯體酸矯首東山雲行人為我言言君騎紫馬近在十里間溪邊古松隄栁波梅飛殘疾走落巾履歡迎許平安津津眉間黄顧我一粲然頗云萬貔虎枕戈卧西闗元戎坐帷幄花幕清晝閑井絡天一涯可以加飯餐復出羣公詩字字冰雪寒窮探到㝠窈老語角險難一讀重驚嘆再讀醒昏頑嗟我平生心文陣亡左旃遽拭涓滴眼窺此瀛海寰並驅吾豈敢愧負百且千尚能督租賦用博酟酒錢日日與君醉髙歌易長嘆再和煌煌六藝學兀兀門亦専耕道宜有秋而我適旱乾疎鬢日月邁破衣霜雪單誰謂四海寛已覺一飽難失計墮簿領署判手為酸皇家挈天綱昨下如綸言冷眼看匠手雌黄英俊間華堂玉塵動繡簾香鴨殘為國得一人可使天下安當時呼畫師我愧寧不然策勲徑投筆守志甘抱闗渥洼萬里心束芻老廏閑豈無苜蓿盤可以羞晨餐豈無芰荷衣可以備祁寒天地日莽蒼逢辰諒多艱世既不吾與不去良亦頑搖搖故山心長風動旌旃君今門下士良莊滿人寰與我各相去何啻一小千異時白雲邸仰君分酒錢富貴無相忘勿徒況永嘆西北有髙樓西北有髙樓氛氲臨大路飛簷轉春風綺忩瑣雲霧姣服者誰子傾城此容與娟娟長眉青不受脂澤汚娉婷惜不嫁恐為蕩子悮寫心汎清瑟獨不怨遲暮東方有一士東方有一士不見心忡忡尺璧未足多夙好良所同永懐不能寐攬衣出房櫳遙夜未渠央取琴和秋蟲豈無時世交掣肘不相容題報恩方丈宋子展所作墨竹叢筠抱清節茂若含幽翠孤樹老風霜空枝少春意其中有磐石人莫知其器堅頑如我心脱盡榮枯累畫不與詩謀詩輒窮微理何時逢畫郎忘言笑相視和楊拱辰見惠所操或異趣竝席寧相親臭味儻不殊千里情猶伸古今邪正間何啻萬微塵平生閲世眼服膺無㡬人濟濟數君子厖然氣深淳南郭服仁義轍跡世所循楊侯墨池孫清厲凌蒼旻公幹抱竒藴謦咳皆瑰珍造物豈私我恵我為徳鄰賤子嬰禍羅蹭蹬巴江垠棄逐類秦客顦顇如楚臣九死不能悔百煉未失真敢希鳴玉侣庶混擊壤民飲水蠲煩燥薫香懺貪嗔朅來古安漢息黥幸依仁至道迷所適避風時問津昨者枉車蓋正值霜雪辰厨空無盛煙坐冷乏軟茵墻頭丐鄰翁殽核粗且陳公言我未暇語竟即踆踆挽袂不可止滿坐顏色顰公方遲騰踏我已甘隱淪我歸楚之䕫公家蜀之岷感此會合難時來笑脱巾酒户較深闊句法窺清新縱遊當秉燭正恐别鼻辛公能勉此樂我及畱中春再和人言不飲酒神形不相親我云不遊山足攣不可伸徑須向泉石抖擻人我塵況復山林姿豈類軒冕人出門見四野便有羲皇淳昔遊頗有得已事猶可循異時春開隂晴霽如秋旻殽蔌粗提攜不必皆竒珍客居我貧者尚能乞諸鄰相與臨小軒眼界浩無垠水遶拖長帶山來趨小臣軒前聳朱鳯曽是棲羣真飄遊邈何許蹟可訪遺民吾徒況健步人扶必怒嗔頻行當導引能除體不仁想當聞此約喜見顔津津必不類世俗咫尺小參辰鳥語聼妙轉草軟藉芳茵信宿得蘇李良㑹如荀陳飜思塵土中旦暮走踆踆有如對酸醯未啜已深顰放意寛衰䬃收機入混淪尚欲挈妻子終焉老西岷或欲東入海披髮謝冠巾況茲一日遊暫令耳目新於事竟何補在已徒自辛騎馬事干謁汩汩窮昏晨不如且行樂一笑酬中春和嘉州通判賈元升見贈山城鳥鵲喜佳句來春風浣手三過讀散我磈磊胷當年過秦論千載猶為雄今觀妙好辭蹀躞追前蹤文章信有種字字含徵宫少城初識面軟語開沖融秋月耿髙懷春水瑩清衷俱墮人事海煩促難舂容況乃燕雀卑未易參鸞鴻别來卬筰外一笑誰與同羨君對賢牧快飲如渴虹何當款齋閣餘瀝借衰紅所幸九河潤密邇千乘封臭味譬草木我輩情所鍾夢隨沫若水下與九頂通更願洗老眼見君攀翔龍題蘇慶嗣睡樂軒六鑿森劍㦸一枕寄華胥睡覺既殊轍睡兮真樂歟達人藴大觀方寸包太虛憂樂兩不知寤寐常如如昔也蝶栩栩今焉周蘧蘧而今我法中無欠亦無餘以睡為樂邪不睡寧非渠然則此軒名無乃滯一隅蘇子笑而應斯豈真吾居飄流閲世故早覺心地初今古一偃仰天地一蘧廬揭名聊爾爾至言恐驚愚出郊以江路野梅香為韻得路字居然麋鹿性疎散疾已痼杖策城東門曠景引閒步日正搖江影春已暖沙路疎梅忽相值與我如有素清芬煦嚴律玉骨洗寒露頗復動詩興況乃有酒户與君嗅花飲飲罷為花賦攬此冰雪姿裁作山間句更得雙南金何遜似風度夷融興未愜短景不少駐呼僮扶步歸要折花無數寄題何子應金華書院吾聞何月卿逸氣欲傾瀉詞源浩班揚詩律薄風雅想初讀書眼坐閲燈㡬炧士生貴適性安得計用舎青鞋踏九疑絲絇逺金馬飄然瀟湘遊采芷動盈把吁嗟既憂患猶得營萬瓦我無茅一廬刼刼思里社送馮獻道運使得岸字蜀江灔新肥送客上霄漢别懐老易感醉幘狂更岸春暄鼔氣全風軟帆力半青雲隨步履紫氣鬱几案清明銷積隂當陽盛熙旦羣姦付嚴科四海歸睿斷君行此其時國光炳大觀況乃濟時須礧砢真巨幹舉杯酧柂尾為賦鹿鳴亂雲從動巖穴起我病痯痯溝壑未填委胡為甘屏竄日邊多故人為我致此段題郭信可琴中趣軒泠泠接吾耳塵爾非真精大音寂無響瓦礫如雷鳴古今滯迷妄溜溜塵所縈落葉隨水去顛風吹殘英道人了本源超然契無生銷鎔天所假浩蕩還空明視聽非耳目況復求音聲竹木閟漁社衡茅落初營杖藜候晚收曳履看春耕無為萬物逝不言四時行情塵泯絶處大地皆䪫韺淵明出醉語能與此理并見之偶一笑呼兒署南榮莫作如是觀吾軒本無名題虎丘海甸平無際突阜如踞虎杉松閟巖壑殿閣煥藻黼老眼凌雲煙呉會畧可俯昔遊恍如昨歳月不勝數老矣愜重來病倦喜欲愈況復偕賢彥清罇侑歌舞髙談聞善謔錦繡落英吐籬菊粲佳節山屐霽淫雨蜀客萬里外艱虞棘肺腑摧頹已無氣賴此作一鼔却欲挽長江快意洗天宇且復置是事秋風送歸櫓中秋飲張仁甫家探韻得玉字數日及中秋迎月試新醁清暉困屏翳頑隂費驅逐廣座迷罇爼髙堂費燈燭未用䘏一眚何妨縱百沃見人如見月張家呼小玉同郭師聖司空仲容探韻得江字孤月流髙天分影遍千江我來無人境亦復窺幽忩好客如佳月開門輒摐摐月到客亦到不隔山㟅谾把手入茅廬笑語鐘新撞一鳴驚人友更挾飛鳬雙連璧光照眼老我心所降呼童洗瓦盞竹葉傾山缸清谿潄鳴玉老樹森髙幢更招二三子放懐山水邦分題得佳句一字鼎可扛男兒樹勲徳出手便可樁願移詩句力挽俗還純厖惟予心已灰庶㡬鹿門龎與諸友同坐梅下月霧淒清風琴泠然不類人世各聮三二語醉歸卧南忩下明日徵所出語皆忘失不記因追賦古詩以補遺缺月冷逼疎影梅孤泛清光兒曹竅孤竹天風韻絲簧相將二三子中夜聊徜徉泠泠白雪唱灔灔碧霞觴清絶非人境浩蕩真醉鄉飛花炯天星墜葉鳴瓦霜歌放滿空闊神融接混茫三山今何許仙游諒荒唐人間有逍遙豈阻路且長簪紱縻步武得失煎肺腸役役少至老過問或未嘗以愚息我機以學鋤我荒以文導我興以酒發我狂使與風月親寧不荷彼蒼夜久梅影偏月亦隣西岡嚴風吹冠巾白露霑衣裳歸歟掩闗卧枕上從羲皇七言古詩遺䕫門故舊蜀江迸出岷山來飜濤鼓浪成風雷掀天斡地五千里争赴東海相喧豗白鹽赤甲當道路呀然拒之欲使回大山大水相較力宛轉稍肯開東隈山氣盛豪水氣怒二氣停滀成胚胎離騷兮作文章祖始知孕秀鍾英才曄曄令君出此地得非千歳之根荄願祝君如此山水滔滔岌岌風雲起人言富貴出長年拭眼看君出奇偉功名落落麒麟閣公當不負山與水如我頑鈍何為者剩買耕牛老東里安清洞夜坐有懷屋角錦樹風飛揚隂岑夜色凝清霜結庵雲竇謝塵俗危然搔首憂偏長背燈顧影空寂閴亦復自怪何昂藏人生百慮已大瘦顧我耿耿無他膓年來戎馬暗河朔宵旰十載煩吾皇時將朝事問府主王路安得成康莊我亦乾坤一窮士癡心未肯老為郎浩歌慷慨擬投筆門外太白空煌煌願學北地傅介子一節出斬樓蘭王責睡魔緑隂滿門春已還黄鸝門外猶綿蠻蕭蕭冷官無一亊髙齋搔首兀癡頑睡魔襲我意蕭散直來眉睫揚神姦須㬰爽氣溷塵俗雙眸瞑眩那能覸彌明未斷口頭句鼻息如寄雷車間夢魂恍恍何所適飄飄寥廓辭躋攀松風拂足雲生腋深窮月窟超人寰更尋織女支機石天河西户聲潺湲無何有客乘晚興剥剥啄啄敲柴闗驚回清風枕簟冷赤霞夾日崆峒山一日廢書强舌本萌生鄙吝勞清刪謾學昌黎送窮術揮毫加㸃文爛斑睡魔憑物對我語勸我停手開憤顔自言宇宙若非我人生俄頃無休閒謝素師惠二石素師為我良古僻野性乖疎無與適呼門投我清浄友翻是巴江雨好石一石形作巢蓮龜近人團圓生素迹皎如孤月流清空光逐一星斜辟易一石初似瓜色黄年來應被天公劈枯松説與連理心參差再合如膠漆兩石相逢已投分何消引我為儔敵與君傾蓋便忘年未害吾人縛禪寂方今宰相真儒生議割三闗厭勍敵祖宗土宇安生靈幸以艱難念開闢天畿要險壯中華一日捐之良足惜争如推轂老將軍逺煽天風驅退鷁我雖孺子亦有知不憚下圯傳履舄嗟爾兩石如有神尚父兵書欣所習不應黙黙齋閣閑相對人間夜寥閴和郭信可苦寒曲一首朔風吹沙邊雲黄行人墮指鳥獸僵鷫鸘裘弊醉何有呼吸七氣成冰霜畫堂繡幕圍絲管馥馥麝煙紅吐煖貧人尺布不可縫夜長展轉牛衣短將軍領戍山上山勁弩折角刁斗寒鉄衣照雪夜如水哀雁一聲心欲死年年官賜冬衣絹婦女從軍身不徧來歳忍寒須努力農家飢死無人織闗山月秋笳吹斷朔風起霜結層冰斷遼水殺氣横空月上遲草色蕭瑟邊風悲萬里征夫齊悵望操兵初入沙場廣將軍樊噲勇敢兒肉食萬里班超相天兵乘障驅貔貅寳劍欲斷星旄頭輕生百戰百勝罷塞原積骨誰能收至今唯有闗山月樂府聲中愁不絶陽春曲栁帶抽春寒氣淺風光曉引春樓怨闗山行人久不歸鸞瘦舞腰雙綬緩錦書難寄北征鴻歸飛海燕翻晴空芳菲韶景伴愁老蘭苑桃花落照紅自開江歸依山結茅以居偶成長句酒腐於爵肉腐俎擔石之儲我何有陸居無屋江無船誰人乞與買山錢大梁千里森寒玉瓊茅桂棟營山麓雲涵雨霂謝天公苦為貧人養黄犢秋衣更續谿芙蓉蟬腹龜腸欲御風戲遣冰懐搜老語食無煙火更玲瓏銅臭錢鳴總無惡更換清貧終不諾濁不能堪飢可忍木强須撩天一哂題楊氏清福亭㡬年瀕江種松竹鬱鬱葱葱蔽江曲猶有楊侯舊子孫更結髙亭貯寒緑東家殺賊印鑄金西家言事腰胯玉一罇徑醉我不知不待招呼風月足有客胷中抱經濟才髙正患功名促閒為清福非吾事乞與此亭作佳目主人再拜不敢讓願作閒人老林麓江平酒熟夜收釣鴨肥稻香朝坦腹此時寄語惡長官勿遣追胥駭僮僕紹興六年十月六日同信可舜弼進道謁隱甫值渠曬畫於中庭遂得縱觀中間不無可人意獨范寛雪山八幅超然絶羣令人意象肅如真得脱身歸巖壑間者請賦詩以知君重毫素為韻得君字畫山畫骨更畫魂范寛此中髙出羣君家八幅老筆墨百年古篋鋪香芸我來日出掛東壁蒼崖落雪飛紛紛寒鳥不動空無塵蕩蕩晴天開四垠終南太華入霄漢秀色千里填河汾想當盤礴未畫時天地開闢雲中君長鯨吸川欲酣醺疾起信手驅風雲須㬰却立萬嶺下援筆往往齒沒齦平生愛山在夢寐行年四十老更文摩挲巖壑重感歎徑欲杖屨從麋麕畫龍儻有真龍至歸即到山非浪云列仙之儒恐邂逅煙霞芝术應平分策師南遊過三峽見予求施以詩會余憂悲苦惱無意賦詠姑借梅為喻送行則無一字不著題此本分事不妨大親切也䇿將安取紹興十四年十二月一日䇿骨寒瘦枯梅枝梅花開時徵我詩我詩悲瘁作無意借梅代我陳其詞梅云最先得春意桃花亂攙作佛事千年冷落空自知今日相看合何似迦葉眼睛誰不有先覺我當為上首普令世界識春光南枝待入瞿曇手僧有悟䇿者見予於珞磧江上誦程子山孫李辰李仁甫賦成都信相寺水月亭之什僕曩客成都朝夕過信相鑑公求此詩至再三余謂詩於佛法業成綺語每笑訶之不為作今䇿誦二三公佳句起予追賦長句付䇿令寄鑑公天行明月地行水水月相去八萬里天公大力誰能移月在水中天作底我心與月明作兩真月本在青天上雖云佛説我别説恐入衆生顛倒想少城城隈佛宫闕客哦水月僧饒舌三峽水寒梅花時起予對月賽此詩江月亭朱㡬聖來為張氏求江月亭詩舟中載四大部經函有蛇出其旁㡬聖以為經之異予曰焉知非明月沱中龍將亦求詩邪故作詩付㡬聖而併及之張家作亭跨江月久欲題詩詩思竭今朝龍泉寳函來豈亦索詩光貝闕忽憶曩時醉亭上笑倚長松清興發波光浩渺蕩罇爼夜色鮮明見毫髮是時披襟揖灝氣蠲滌肺肝洗塵骨歸來至今忽想像猶覺人寰可超越會當月夕駕煙槳吹笛呼龍出龍窟蓬萊方丈儻可尋借我長風泛溟渤題楊毅肅十馬圖平生仰聞毅肅公南征北伐開駿功所乘十馬有圖畫今觀逸氣猶追風當時血戰冒飛矢一中鈎膺一貫耳功名富貴豈偶然請看將軍出萬死紹興壬戌之仲冬李嚴城頭霜月空夜深無寐開素軸感時撫事三嘆息和楊偉明韻黄花不待我西歸去載空吟九日詩今載擬招風月友共醉黄花香滿枝佳辰不許負佳客我友南北如分岐驕馬行嘶縉雲碧楚狂使我無退之把杯聲作噫吁嚱傷予未遇空嗟咨雄文自是送窮術那憂窮鬼長相隨牘中燦燦藍田玉有誰懷寳遇明時慷慨男兒當自料少把閒愁愁所思題岳陽樓洞庭涵浸八百里岳陽樓髙跨湖尾天空地迥豁疎襟有客臨風來徙倚是時窮冬天氣昏慘淡愁殺湘君魂層欄半落煙氛外浩蕩猶恐旋乾坤異時清霄玉鑑白空明月路飛仙客明朝露華洗七澤萬頃寒光天一色眼中未見此境好他日扁舟吾未老縉雲文集巻一
